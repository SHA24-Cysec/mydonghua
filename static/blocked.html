<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>403 Forbidden</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a1d;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 8rem;
      margin: 0;
      color: #ff4c60;
      animation: pulse 1.5s infinite;
    }

    h2 {
      font-size: 2rem;
      margin: 0;
      margin-bottom: 20px;
    }

    p {
      font-size: 1rem;
      color: #ccc;
    }

    a {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 25px;
      background: #ff4c60;
      color: #fff;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s ease;
    }

    a:hover {
      background: #ff1e3c;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .logo img {
      height: 40px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <!-- Ganti dengan logo kamu -->
    <img style="border-radius: 999px;" src="/img/favicon.webp" alt="DonghuaBatch">
  </div>

  <h1>403</h1>
  <h2>Access Denied</h2>
  <p>You don't have permission to view this page.</p>
  <a href="/">← Back to Home</a>
</body>
</html>
