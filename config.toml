baseURL = 'https://donghuabatch.com/'
title = 'DonghuaBatch - Tempatnya Download Batch Donghua Subtitle Indonesia'
defaultContentLanguage = 'id'
uglyURLs = false

[services]
    [services.googleAnalytics]
        id = 'G-7B40JB824Z'
    [services.rss]
        limit = -1

[taxonomies]
    genres = 'genre'
    studios = 'studio'
    seasons = 'season'

[markup.goldmark.renderer]
    unsafe = true

[params]
    deskripsi = 'Tempat Download Batch Donghua subtitle Indonesia'
    keywords = 'Donghua, Batch, Subtitle Indonesia'
    author = 'Admin'
    img = '/img/favicon.webp'

  # Popunder Adsterra — menggantikan fitur Smartlink click-trigger.
  # Script hanya dimuat pada halaman yang dipanggil dari layout
  # agar scope iklan tetap terkontrol dan tidak mengganggu halaman lain.
  # Untuk rotasi script: cukup ganti nilai src di bawah, lalu rebuild.
  [params.popunder]
    enabled = true
    src = 'https://bendspecimen.com/b5/5c/0f/b55c0fe92f1b9672886a2698dfa8de8f.js'

[sitemap]
    changeFreq = 'weekly'
    priority = 0.8

[pagination]
    disableAliases = true

[outputs]
    home = ['HTML', 'rss', 'json']

# Hugo Modules – mount static/img to assets/img
# Supaya resources.Get bisa proses thumbnail di static/img/post/
# tanpa perlu copy manual ke assets/img/post/
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  # Mount tambahan: expose static/img ke assets/img untuk Hugo Pipes
  [[module.mounts]]
    source = "static/img"
    target = "assets/img"

[minify]
  disableJS = false