{{ define "main" }}
<div class="notfound-dock-page">
    <section class="notfound-dock-shell" aria-labelledby="notfound-title">
        <div class="notfound-dock-hero" aria-hidden="true">
            <span class="notfound-dock-grid"></span>
            <span class="notfound-dock-orbit orbit-one"></span>
            <span class="notfound-dock-orbit orbit-two"></span>
            <span class="notfound-dock-code">404</span>
        </div>

        <div class="notfound-dock-panel">
            <div class="notfound-dock-handle" aria-hidden="true"></div>

            <div class="notfound-dock-content">
                <span class="notfound-dock-kicker">
                    <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
                    Error 404
                </span>

                <h1 id="notfound-title">Halaman tidak ditemukan</h1>
                <p id="notfound-desc">Halaman yang kamu buka tidak tersedia, telah dipindahkan, atau alamat URL yang dimasukkan kurang tepat.</p>

                <form class="notfound-dock-search mt-5" role="search" action='{{ "search/" | relURL }}' method="get" aria-label="Cari donghua dari halaman 404">
                    <label class="sr-only" for="notfound-search-input">Cari judul donghua</label>
                    <i class="fa-solid fa-magnifying-glass notfound-dock-search-icon" aria-hidden="true"></i>
                    <input required id="notfound-search-input" class="notfound-dock-search-input" type="search" name="q" minlength="3" autocomplete="off" placeholder="Cari judul donghua..." aria-label="Cari judul donghua">
                    <button class="notfound-dock-search-btn" type="submit" aria-label="Cari donghua">
                        <span>Cari</span>
                        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                    </button>
                </form>

                <nav class="notfound-dock-actions mt-4" aria-label="Navigasi bantuan halaman 404">
                    <a class="notfound-dock-btn primary" href='{{ "/" | relURL }}'>
                        <i class="fa-solid fa-house" aria-hidden="true"></i>
                        Beranda
                    </a>
                    <a class="notfound-dock-btn ghost" href='{{ "search/" | relURL }}'>
                        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                        Search
                    </a>
                    <a class="notfound-dock-btn ghost" href='{{ "/#genre" | relURL }}'>
                        <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
                        Genre
                    </a>
                </div>
            </div>
        </div>
    </section>
</div>


{{ end }}
