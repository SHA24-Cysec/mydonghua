{{ define "main" }}
<div class="notfound-dock-page">
    <section class="notfound-dock-shell" aria-labelledby="notfound-title">
        <div class="notfound-dock-hero" aria-hidden="true">
            <span class="notfound-dock-grid"></span>
            <span class="notfound-dock-orbit orbit-one"></span>
            <span class="notfound-dock-orbit orbit-two"></span>
            <span class="notfound-dock-code">404</span>
        </div>

        <div class="notfound-dock-panel">
            <div class="notfound-dock-handle" aria-hidden="true"></div>

            <div class="notfound-dock-content">
                <span class="notfound-dock-kicker">
                    <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
                    Error 404
                </span>

                <h1 id="notfound-title">Halaman tidak ditemukan</h1>
                <p>Halaman yang Anda buka tidak tersedia, telah dipindahkan, atau alamat URL yang dimasukkan kurang tepat.</p>

                <div class="notfound-dock-actions" aria-label="Navigasi halaman 404">
                    <a class="notfound-dock-btn primary" href='{{ "/" | relURL }}'>
                        <i class="fa-solid fa-house" aria-hidden="true"></i>
                        Beranda
                    </a>
                    <a class="notfound-dock-btn ghost" href='{{ "search/" | relURL }}'>
                        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                        Search
                    </a>
                    <a class="notfound-dock-btn ghost" href='{{ "/#genre" | relURL }}'>
                        <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
                        Genre
                    </a>
                </div>
            </div>
        </div>
    </section>
</div>


{{ end }}
