{{/*  Navbar PC  */}}
<nav class="bg-sky-300 shadow shadow-black sticky top-0 z-50 w-full font-bold md:flex items-center justify-between">
  <div class="flex justify-between items-center px-4 py-3 md:max-w-7xl md:mx-auto">
    <!-- Logo / Brand -->
    <a href="{{ .Site.BaseURL }}" class="text-lg flex items-center gap-1">
      <img class="rounded-full" width="32" height="32" src="/img/favicon.webp" alt="Logo">
      <span>DonghuaBatch</span>
    </a>

    <!-- Hamburger Menu -->
    <button id="hamburgerBtn" class="md:hidden text-2xl focus:outline-none">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <!-- Menu Utama -->
  <menu id="mainMenu" class="hidden md:flex flex-col md:flex-row items-start md:items-center md:justify-between md:flex-wrap px-4 md:px-0 md:mx-auto md:max-w-screen-xl">
    <a class="hover:bg-sky-400 flex items-center gap-1 text-md p-4 w-full md:w-auto" href="{{ .Site.BaseURL }}">
      <i class="fa-solid fa-house"></i> Beranda
    </a>

    <div class="relative w-full md:w-auto">
      <button id="tombolGenre" class="hover:bg-sky-400 w-full md:w-auto cursor-pointer flex items-center gap-1 text-md p-4">
        <i id="folder" class="fa-solid fa-folder"></i>
        <span>Genre</span>
        <i class="transition duration-300 fa-solid fa-chevron-down" id="arrowGenre" name="chevron-down"></i>
      </button>
      <div id="menuGenre" class="absolute hidden shadow p-4 shadow-black h-80 overflow-y-auto w-full bg-sky-300 md:w-80 md:left-0 md:top-full z-40">
        {{ range $name, $taxonomy := .Site.Taxonomies.genre }}
        <a href='{{ "genre/" | relLangURL }}{{ $name | urlize }}' class="block px-2 py-1 hover:bg-sky-400">{{ $name | title }}</a>
        {{ end }}
      </div>
    </div>

    <a target="_blank" class="hover:bg-sky-400 flex items-center gap-1 text-md p-4 w-full md:w-auto" href="https://saweria.co/sha24">
      <i class="fa-solid fa-leaf"></i> Support
    </a>
    <a class="hover:bg-sky-400 flex items-center gap-1 text-md p-4 w-full md:w-auto" href='{{ relURL "kontak" }}'>
      <i class="fa-solid fa-phone"></i> Kontak
    </a>
    <a class="hover:bg-sky-400 flex items-center gap-1 text-md p-4 w-full md:w-auto" href='{{ relURL "search" }}'>
      <i class="fa-solid fa-magnifying-glass"></i> Cari
    </a>
  </menu>
</nav>

<script>
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mainMenu = document.getElementById('mainMenu');
  const tombolGenre = document.getElementById('tombolGenre');
  const menuGenre = document.getElementById('menuGenre');
  const arrowGenre = document.getElementById('arrowGenre');
  const folder = document.getElementById('folder');

  hamburgerBtn.addEventListener('click', () => {
    mainMenu.classList.toggle('hidden');
  });

  // Toggle dropdown genre
  tombolGenre.addEventListener('click', (event) => {
    menuGenre.classList.toggle('hidden');
    arrowGenre.classList.toggle('rotate-180');
    folder.classList.toggle('fa-folder-open');
    event.stopPropagation();
  });

  document.addEventListener('click', (event) => {
    if (!menuGenre.contains(event.target) && !tombolGenre.contains(event.target)) {
      menuGenre.classList.add('hidden');
      arrowGenre.classList.remove('rotate-180');
      folder.classList.remove('fa-folder-open');
    }
  });
</script>
