<style>

  .site-navbar-menu a {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    min-height: 2.42rem;
    padding: 0.62rem 0.78rem;
    border: 1px solid transparent;

    color: #d8e9ff;

  }

  .site-nav-backdrop {
    position: fixed;
    inset: 0;
    z-index: 2000;
    pointer-events: none;
    background: rgba(2, 6, 23, 0.78);
    opacity: 0;

  .site-navbar-toggle:focus-visible,
  .site-nav-close:focus-visible,
  .site-nav-search input:focus-visible,
  .site-nav-search button:focus-visible,
  .site-nav-grid a:focus-visible,
  .site-navbar-menu a:focus-visible {

    outline-offset: 3px;

  @media (hover: hover) {
    .site-navbar-menu a:hover {
      border-color: rgba(34, 211, 238, 0.28);
      background: rgba(34, 211, 238, 0.10);
      color: #a5f3fc;
      box-shadow: 0 0 16px rgba(34, 211, 238, 0.12);
      transform: translateY(-1px);

    .site-navbar-toggle:hover,
    .site-nav-close:hover,
    .site-nav-grid a:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);

  @media (min-width: 768px) {

    .site-nav-backdrop,

  @media (min-width: 1280px) {

      padding-right: 0;

  @media (max-width: 360px) {
    .site-nav-grid {
      grid-template-columns: 1fr;

  @media (prefers-reduced-motion: reduce) {
    .site-navbar-menu a,
    .site-navbar-toggle,
    .site-nav-close,
    .site-nav-backdrop,
    .site-nav-sheet,
    .site-nav-grid a {
      transition: none !important;
    }
  }

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const container = document.querySelector('[data-site-nav-container]');
    if (!container) return;

    const toggleButton = container.querySelector('[data-nav-open]');
    const toggleIcon = toggleButton ? toggleButton.querySelector('i') : null;
    const desktopQuery = window.matchMedia('(min-width: 768px)');

    function isOpen() {
      return container.classList.contains('is-open');
    }

    function syncToggleButton(open) {
      if (!toggleButton) return;
      toggleButton.setAttribute('aria-expanded', open ? 'true' : 'false');
      toggleButton.setAttribute('aria-label', open ? 'Tutup menu navigasi' : 'Buka menu navigasi');

      if (toggleIcon) {
        toggleIcon.className = open ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
      }
    }

    function openNav() {
      container.classList.add('is-open');
      document.body.classList.add('site-nav-lock');
      syncToggleButton(true);
    }

    function closeNav() {
      container.classList.remove('is-open');
      document.body.classList.remove('site-nav-lock');
      syncToggleButton(false);
    }

    function toggleNav() {
      isOpen() ? closeNav() : openNav();
    }

    if (toggleButton) {
      toggleButton.addEventListener('click', function (event) {
        event.preventDefault();
        toggleNav();
      });
    }

    container.addEventListener('click', function (event) {
      const isBackdrop = event.target.closest('[data-nav-close]');
      const isNavLink = event.target.closest('[data-nav-link]');
      
      if (isBackdrop || isNavLink) {
        closeNav();
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && isOpen()) closeNav();
    });

    desktopQuery.addEventListener('change', function (event) {
      if (event.matches) closeNav();
    });

    window.addEventListener('beforeunload', closeNav);
    syncToggleButton(false);
  });
</script>
