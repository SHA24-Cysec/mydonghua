{{/*  Navbar PC  */}}
<nav class="bg-[#060816]/90 backdrop-blur-md fixed top-0 z-[999] border-b border-cyan-500/40 shadow-[0_4px_20px_rgba(34,211,238,0.25)] w-full transition-all duration-300">
  <div class="font-bold md:flex items-center justify-between w-full max-w-screen-xl mx-auto px-4 lg:px-0">
      <div class="flex justify-between items-center py-3 w-full">
    <!-- Logo / Brand -->
    <a href="{{ .Site.BaseURL }}" class="text-xl font-extrabold tracking-wider flex items-center gap-2.5 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-sky-300 to-purple-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.6)] group">
      <img class="rounded-full ring-2 ring-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)] transition duration-300" width="32" height="32" src="/img/favicon.webp" alt="Logo">
      <span>DonghuaBatch</span>
    </a>

    <!-- Hamburger Menu -->
    <button class="md:hidden text-2xl px-3 py-1.5 text-cyan-400 border border-cyan-500/50 active:bg-cyan-500/20 rounded-xl shadow-[0_0_12px_rgba(34,211,238,0.3)] transition-all duration-300 flex items-center justify-center">
      <div id="menuBtn">
        <i class="fa-solid fa-bars"></i>
      </div>
      <div id="closeBtn" class="hidden">
        <i class="fa-solid fa-close"></i>
      </div>
    </button>
  </div>

  <!-- Menu Utama -->
  <menu id="mainMenu" class="hidden md:flex flex-col md:flex-row items-start md:items-center md:justify-between gap-2 md:gap-4 pb-4 md:pb-0 transition-all duration-300 w-full md:w-auto">
    <a class="text-slate-200 hover:text-cyan-300 hover:bg-cyan-500/15 hover:border-cyan-500/50 border border-transparent rounded-full transition-all duration-300 flex items-center gap-2 text-md px-4 py-2 w-full md:w-auto font-medium shadow-sm hover:shadow-[0_0_15px_rgba(34,211,238,0.35)]" href="{{ .Site.BaseURL }}">
      <i class="fa-solid fa-house text-cyan-400"></i> Beranda
    </a>
    <a class="text-slate-200 hover:text-cyan-300 hover:bg-cyan-500/15 hover:border-cyan-500/50 border border-transparent rounded-full transition-all duration-300 flex items-center gap-2 text-md px-4 py-2 w-full md:w-auto font-medium shadow-sm hover:shadow-[0_0_15px_rgba(34,211,238,0.35)]" href="/#genre">
      <i class="fa-solid fa-folder text-cyan-400"></i> Genre
    </a>
    <a rel="noopener noreferrer" target="_blank" class="text-slate-200 hover:text-cyan-300 hover:bg-cyan-500/15 hover:border-cyan-500/50 border border-transparent rounded-full transition-all duration-300 flex items-center gap-2 text-md px-4 py-2 w-full md:w-auto font-medium shadow-sm hover:shadow-[0_0_15px_rgba(34,211,238,0.35)]" href="https://saweria.co/DonghuaBatch">
      <i class="fa-solid fa-leaf text-green-400"></i> Support
    </a>
    <a class="text-slate-200 hover:text-cyan-300 hover:bg-cyan-500/15 hover:border-cyan-500/50 border border-transparent rounded-full transition-all duration-300 flex items-center gap-2 text-md px-4 py-2 w-full md:w-auto font-medium shadow-sm hover:shadow-[0_0_15px_rgba(34,211,238,0.35)]" href='{{ relURL "kontak" }}'>
      <i class="fa-solid fa-phone text-purple-400"></i> Kontak
    </a>
    <a class="text-slate-200 hover:text-cyan-300 hover:bg-cyan-500/15 hover:border-cyan-500/50 border border-transparent rounded-full transition-all duration-300 flex items-center gap-2 text-md px-4 py-2 w-full md:w-auto font-medium shadow-sm hover:shadow-[0_0_15px_rgba(34,211,238,0.35)]" href='{{ relURL "search" }}'>
      <i class="fa-solid fa-magnifying-glass text-pink-400"></i> Cari
    </a>
  </menu>
  </div>
</nav>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const mainMenu = document.getElementById('mainMenu');
  const closeBtn = document.getElementById('closeBtn');

  menuBtn.addEventListener("click", () => {
    menuBtn.classList.add("hidden");
    closeBtn.classList.remove("hidden");
    mainMenu.classList.remove("hidden");
  })

  closeBtn.addEventListener("click", () => {
    menuBtn.classList.remove("hidden");
    closeBtn.classList.add("hidden");
    mainMenu.classList.add("hidden");
  })
</script>
