{{/*  Navbar PC  */}}
<nav class="bg-sky-300 fixed top-0 z-[999] shadow-md shadow-black w-full">
  <div class="font-bold md:flex items-center justify-between w-full max-w-7xl mx-auto px-2 lg:px-0">
      <div class="flex justify-between items-center py-3 w-full">
    <!-- Logo / Brand -->
    <a href="{{ .Site.BaseURL }}" class="text-lg flex items-center gap-1">
      <img class="rounded-full" width="32" height="32" src="/img/favicon.webp" alt="Logo">
      <span>DonghuaBatch</span>
    </a>

    <!-- Hamburger Menu -->
    <button class="md:hidden text-2xl px-2 active:bg-sky-400 rounded-lg transition-transform duration-300 flex items-center justify-center">
      <div id="menuBtn">
        <i class="fa-solid fa-bars"></i>
      </div>
      <div id="closeBtn" class="hidden">
        <i class="fa-solid fa-close"></i>
      </div>
    </button>
  </div>

  <!-- Menu Utama -->
  <menu id="mainMenu" class="hidden md:flex flex-col md:flex-row items-start md:items-center md:justify-between gap-4 transition-transform">
    <a class="hover:bg-sky-400 hover:text-white hover:rounded-full flex items-center gap-1 text-md p-2 w-full md:w-auto" href="{{ .Site.BaseURL }}">
      <i class="fa-solid fa-house"></i> Beranda
    </a>
    <a class="hover:bg-sky-400 hover:rounded-full hover:text-white flex items-center gap-1 text-md p-2 w-full md:w-auto" href="/#genre">
      <i class="fa-solid fa-folder"></i> Genre
    </a>
    <a target="_blank" class="hover:bg-sky-400 hover:rounded-full hover:text-white flex items-center gap-1 text-md p-2 w-full md:w-auto" href="https://saweria.co/DonghuaBatch">
      <i class="fa-solid fa-leaf"></i> Support
    </a>
    <a class="hover:bg-sky-400 hover:rounded-full hover:text-white flex items-center gap-1 text-md p-2 w-full md:w-auto" href='{{ relURL "kontak" }}'>
      <i class="fa-solid fa-phone"></i> Kontak
    </a>
    <a class="hover:bg-sky-400 hover:rounded-full hover:text-white flex items-center gap-1 text-md p-2 w-full md:w-auto" href='{{ relURL "search" }}'>
      <i class="fa-solid fa-magnifying-glass"></i> Cari
    </a>
  </menu>
  </div>
</nav>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const mainMenu = document.getElementById('mainMenu');
  const closeBtn = document.getElementById('closeBtn');

  menuBtn.addEventListener("click", () => {
    menuBtn.classList.add("hidden");
    closeBtn.classList.remove("hidden");
    mainMenu.classList.remove("hidden");
  })

  closeBtn.addEventListener("click", () => {
    menuBtn.classList.remove("hidden");
    closeBtn.classList.add("hidden");
    mainMenu.classList.add("hidden");
  })
</script>
