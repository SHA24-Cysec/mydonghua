{{/*  Fuse.js  */}}
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0"></script>
<script>
    const searchInput = document.getElementById("search-input");
    const resultsList = document.getElementById("search-results");

    let fuse = null;

    fetch("/index.json")
      .then(res => res.json())
      .then(data => {
        fuse = new Fuse(data, {
        keys: [
          "title",
          "studio",
          "season",
          "genre"
        ],
        useExtendedSearch: true,
        threshold: 0,
        ignoreLocation: true,
        includeMatches: true
      });
      });
    
    {{/*  Pagination  */}}
    
    let currentPage = 1;
    const perPage = 8;
    let currentResults = [];

    {{/*  Highlight Results  */}}
    function highlightText(text, matches, key) {
      if (!matches || !text) return text;

      const relevantMatches = matches.filter(m => m.key === key);
      if (!relevantMatches.length) return text;

      const indices = relevantMatches
        .flatMap(m => m.indices)
        .sort((a, b) => a[0] - b[0]);

      let highlighted = "";
      let lastIndex = 0;

      indices.forEach(([start, end]) => {
        if (start < lastIndex) return;
        highlighted += text.slice(lastIndex, start);
        highlighted += `<mark>${text.slice(start, end + 1)}</mark>`;
        lastIndex = end + 1;
      });
    
      highlighted += text.slice(lastIndex);
      return highlighted;
    }

    function renderResults() {
      resultsList.innerHTML = "";
        
      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageItems = currentResults.slice(start, end);
        
      pageItems.forEach(({ item, matches }) => {
        const li = document.createElement("li");

        const rawStudio = item.studio && item.studio !== "-" ? item.studio : "";
        const rawSeason = item.season && item.season !== "-" ? item.season : "";
        const rawGenre = item.genre && item.genre !== "-" ? item.genre : "";

        const title  = highlightText(item.title, matches, "title");
        const studio = rawStudio ? highlightText(rawStudio, matches, "studio") : "";
        const season = rawSeason ? highlightText(rawSeason, matches, "season") : "";
        const genre  = rawGenre ? highlightText(rawGenre, matches, "genre") : "";
        const metaStr = [studio, season, genre].filter(Boolean).join(" • ");

        li.innerHTML = `
          <div class="group relative w-full h-[240px] md:h-[340px] rounded-2xl overflow-hidden bg-[#0F172A] border border-slate-800 hover:border-pink-500/80 transition-all duration-500 hover:shadow-[0_0_25px_rgba(236,72,153,0.4)] cursor-pointer">
            <a title="${item.title}" href="${item.permalink}" class="absolute inset-0 z-0 block w-full h-full overflow-hidden">
                <img loading="lazy" class="group-hover:scale-110 w-full h-full object-cover transition-transform duration-700 ease-out" src='${item.thumbnail}' alt="${item.title}">
                <span class="absolute top-3 left-3 z-20 bg-[#060816]/85 backdrop-blur-md border border-cyan-400 text-cyan-300 text-[10px] md:text-xs font-extrabold px-2.5 py-1 rounded-full shadow-[0_0_12px_rgba(34,211,238,0.5)] uppercase tracking-wider">${item.type || "Donghua"}</span>
                <span class="absolute top-3 right-3 z-20 bg-gradient-to-r from-pink-500 to-purple-600 text-white text-[10px] md:text-xs font-extrabold px-2.5 py-1 rounded-full border border-pink-300/50 shadow-[0_0_12px_rgba(236,72,153,0.6)]">Sub</span>
            </a>
            <a class="absolute inset-x-0 bottom-0 z-10 flex flex-col justify-end pt-12 pb-3.5 px-3.5 bg-gradient-to-t from-[#060816] via-[#060816]/90 to-transparent" href="${item.permalink}">
                <span class="card-holo-title font-extrabold text-white text-xs md:text-sm line-clamp-2 leading-snug group-hover:text-pink-400 transition-colors drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]">${title}</span>
                ${metaStr ? `<small class="text-slate-300 group-hover:text-cyan-300 text-[11px] block mt-1 line-clamp-1 font-semibold drop-shadow-[0_1px_2px_rgba(0,0,0,0.9)]">${metaStr}</small>` : ''}
            </a>
          </div>
        `;
        
        resultsList.appendChild(li);
      });
    
      updatePagination();
    }

    function updatePagination() {
      const pagination = document.getElementById("search-pagination");
      const totalPages = Math.ceil(currentResults.length / perPage);

      if (totalPages <= 1) {
        pagination.style.display = "none";
        return;
      }
    
      pagination.style.display = "flex";
    
      document.getElementById("page-info").textContent =
        `Page ${currentPage} of ${totalPages}`;
    
      document.getElementById("prev-page").disabled = currentPage <= 1;
      document.getElementById("next-page").disabled =
        currentPage >= totalPages;
    }

    {{/*  Masukkan Data  */}}

    function parseGenres(input) {
      return input
        .toLowerCase()
        .split(/[, ]+/)       // koma atau spasi
        .map(g => g.trim())
        .filter(Boolean);
    }

    function parseKeywords(input) {
      return input
        .toLowerCase()
        .split(/[, ]+/)
        .map(k => k.trim())
        .filter(Boolean);
    }

    function getQueryFromURL() {
      const params = new URLSearchParams(window.location.search);
      return {
        q: params.get("q") || "",
        page: parseInt(params.get("page"), 10) || 1
      };
    }

    function updateURL(query, page = 1) {
      const params = new URLSearchParams(window.location.search);

      if (query) {
        params.set("q", query);
        params.set("page", page);
      } else {
        params.delete("q");
        params.delete("page");
      }
    
      const newUrl =
        window.location.pathname +
        (params.toString() ? `?${params.toString()}` : "");
    
      window.history.replaceState({}, "", newUrl);
    }

    {{/*  Bug fix: elemen search-input, search-results, prev-page, dan next-page
          cuma ada di halaman /search/. Semua kode di bawah ini dibungkus
          "if (searchInput && resultsList)" supaya tidak melempar TypeError
          di halaman lain (home, post, filter-genre, dll) yang ikut memuat
          script global ini.  */}}
    if (searchInput && resultsList) {
      searchInput.addEventListener("input", () => {
        const query = searchInput.value.trim();

        resultsList.innerHTML = "";
        currentResults = [];
        document.getElementById("search-pagination").style.display = "none";

        if (!fuse || query.length < 2) {
          updateURL("");
          return;
        }
      
        const keywords = parseKeywords(query);
      
        currentResults = fuse.search({
          $and: keywords.map(k => ({
            $or: [
              { title: `'${k}` },
              { studio: `'${k}` },
              { season: `'${k}` },
              { genre: `'${k}` }
            ]
          }))
        });
      
        currentPage = 1;
        updateURL(query, currentPage);
        renderResults();
      });

      {{/*  Pagination  */}}

      document.getElementById("prev-page").addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage--;
          updateURL(searchInput.value.trim(), currentPage);
          renderResults();
        }
      });

      document.getElementById("next-page").addEventListener("click", () => {
        const totalPages = Math.ceil(currentResults.length / perPage);
        if (currentPage < totalPages) {
          currentPage++;
          updateURL(searchInput.value.trim(), currentPage);
          renderResults();
        }
      });

      window.addEventListener("DOMContentLoaded", () => {
        const { q, page } = getQueryFromURL();

        if (!q) return;

        searchInput.value = q;

        if (!fuse) {
          const waitFuse = setInterval(() => {
            if (fuse) {
              clearInterval(waitFuse);
              triggerSearchFromURL(q, page);
            }
          }, 50);
        } else {
          triggerSearchFromURL(q, page);
        }
      });
    }

    function triggerSearchFromURL(query, page) {
      const keywords = parseKeywords(query);

      currentResults = fuse.search({
        $and: keywords.map(k => ({
          $or: [
            { title: `'${k}` },
            { studio: `'${k}` },
            { season: `'${k}` },
            { genre: `'${k}` }
          ]
        }))
      });
    
      currentPage = page;
      renderResults();
    }
</script>

{{/*  Script Filter-Genre  */}}

<script>
const genreForm = document.getElementById("genre-filter-form");

if (genreForm) {
  genreForm.addEventListener("submit", e => {
    e.preventDefault();

    const genres = [...document.querySelectorAll('input[name="genre"]:checked')]
      .map(i => i.value);

    if (!genres.length) return;

    window.location.href = "/filter-genre/#" + genres.join(",");
  });
}

function getGenresFromHash() {
  return location.hash
    .replace("#", "")
    .split(",")
    .map(g => g.trim().toLowerCase())
    .filter(Boolean);
}

const resultsContainer = document.getElementById("genre-results");

{{/*  Pagination  */}}
let genrePage = 1;
const genrePerPage = 12;
let genreResults = [];
{{/*  Akhir Pagination  */}}

function renderGenreResults() {
  const alertBox = document.getElementById("genre-alert");
  const pagination = document.getElementById("genre-pagination");

  resultsContainer.innerHTML = "";

  if (!genreResults.length) {
    alertBox.classList.remove("hidden");
    pagination.classList.add("hidden");
    return;
  }

  alertBox.classList.add("hidden");

  const totalPages = Math.ceil(genreResults.length / genrePerPage);
  const start = (genrePage - 1) * genrePerPage;
  const end = start + genrePerPage;

  genreResults.slice(start, end).forEach(item => {
    {{/*  Bug fix: resultsContainer adalah elemen <ul>, jadi child-nya
          harus <li>, bukan <div>. Kalau pakai <div> di dalam <ul>, browser
          akan otomatis memindahkan elemen itu keluar dari <ul> saat parsing
          HTML dan itu bisa merusak layout grid.  */}}
    const li = document.createElement("li");
    li.className = "group relative w-full h-[240px] md:h-[340px] rounded-2xl overflow-hidden bg-[#0F172A] border border-slate-800 hover:border-pink-500/80 transition-all duration-500 hover:shadow-[0_0_25px_rgba(236,72,153,0.4)] cursor-pointer";

    li.innerHTML = `
      <a title="${item.title}" href="${item.permalink}" class="absolute inset-0 z-0 block w-full h-full overflow-hidden">
        <img loading="lazy" class="group-hover:scale-110 w-full h-full object-cover transition-transform duration-700 ease-out" src="${item.thumbnail}" alt="${item.title}">
        <span class="absolute top-3 left-3 z-20 bg-[#060816]/85 backdrop-blur-md border border-cyan-400 text-cyan-300 text-[10px] md:text-xs font-extrabold px-2.5 py-1 rounded-full shadow-[0_0_12px_rgba(34,211,238,0.5)] uppercase tracking-wider">${item.type || "Donghua"}</span>
        <span class="absolute top-3 right-3 z-20 bg-gradient-to-r from-pink-500 to-purple-600 text-white text-[10px] md:text-xs font-extrabold px-2.5 py-1 rounded-full border border-pink-300/50 shadow-[0_0_12px_rgba(236,72,153,0.6)]">Sub</span>
      </a>
      <a class="absolute inset-x-0 bottom-0 z-10 flex flex-col justify-end pt-12 pb-3.5 px-3.5 bg-gradient-to-t from-[#060816] via-[#060816]/90 to-transparent" href="${item.permalink}">
        <span class="card-holo-title font-extrabold text-white text-xs md:text-sm line-clamp-2 leading-snug group-hover:text-pink-400 transition-colors drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]">${item.title}</span>
      </a>
    `;

    resultsContainer.appendChild(li);
  });

  // Pagination UI
  pagination.classList.toggle("hidden", totalPages <= 1);
  document.getElementById("genre-page-info").textContent =
    `Page ${genrePage} of ${totalPages}`;

  document.getElementById("genre-prev").disabled = genrePage === 1;
  document.getElementById("genre-next").disabled = genrePage === totalPages;
}

{{/*  Bug fix: elemen genre-prev dan genre-next cuma ada di halaman
      /filter-genre/. Dibungkus pengecekan supaya tidak error di halaman
      lain (home, post) yang juga memuat script global ini.  */}}
const genrePrevBtn = document.getElementById("genre-prev");
const genreNextBtn = document.getElementById("genre-next");

if (genrePrevBtn && genreNextBtn) {
  genrePrevBtn.addEventListener("click", () => {
    if (genrePage > 1) {
      genrePage--;
      renderGenreResults();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });

  genreNextBtn.addEventListener("click", () => {
    const totalPages = Math.ceil(genreResults.length / genrePerPage);
    if (genrePage < totalPages) {
      genrePage++;
      renderGenreResults();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });
}

window.addEventListener("DOMContentLoaded", () => {
  {{/*  Bug fix: resultsContainer (#genre-results) cuma ada di halaman
        /filter-genre/. Kalau tidak ada, jangan lanjut fetch/render.  */}}
  if (!resultsContainer) return;

  const selectedGenres = getGenresFromHash();
  if (!selectedGenres.length) return;

  fetch("/index.json")
    .then(res => res.json())
    .then(data => {
      genreResults = filterByGenres(data, selectedGenres);
      genrePage = 1;
      {{/*  Bug fix: sebelumnya ada pemanggilan ganda renderGenreResults(filtered)
            dengan variabel "filtered" yang tidak pernah dideklarasikan
            (ReferenceError). renderGenreResults() cukup dipanggil sekali,
            tanpa parameter, karena datanya diambil dari variabel global
            genreResults.  */}}
      renderGenreResults();
    });
});

function normalizeGenres(input) {
  if (!input) return [];

  {{/*  Bug fix: sebelumnya split juga berdasarkan spasi, jadi genre dua
        kata seperti "Martial Arts" pecah jadi "martial" dan "arts" dan
        tidak pernah cocok dengan value checkbox yang di-urlize Hugo jadi
        "martial-arts". Sekarang hanya split berdasarkan koma/pipe, lalu
        spasi di dalam nama genre diubah jadi tanda "-" supaya formatnya
        sama persis dengan hasil "urlize" di sidebar.html.  */}}
  return input
    .toLowerCase()
    .split(/[,|]+/)
    .map(g => g.trim().replace(/\s+/g, "-"))
    .filter(Boolean);
}

function filterByGenres(data, selectedGenres) {
  const selected = selectedGenres.map(g => g.toLowerCase());

  return data.filter(item => {
    if (!item.genre) return false;

    const itemGenres = normalizeGenres(item.genre);

    // AND logic → semua genre harus ada
    return selected.every(g => itemGenres.includes(g));
  });
}
</script>
