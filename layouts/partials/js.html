{{/*  Fuse.js  */}}
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0"></script>
<script>
    const searchInput = document.getElementById("search-input");
    const resultsList = document.getElementById("search-results");

    let fuse = null;

    fetch("/index.json")
      .then(res => res.json())
      .then(data => {
        fuse = new Fuse(data, {
        keys: [
          "title",
          "studio",
          "season",
          "genre"
        ],
        useExtendedSearch: true,
        threshold: 0,
        ignoreLocation: true,
        includeMatches: true
      });
      });
    
    {{/*  Pagination  */}}
    
    let currentPage = 1;
    const perPage = 8;
    let currentResults = [];

    {{/*  Highlight Results  */}}
    function highlightText(text, matches, key) {
      if (!matches || !text) return text;

      const relevantMatches = matches.filter(m => m.key === key);
      if (!relevantMatches.length) return text;

      const indices = relevantMatches
        .flatMap(m => m.indices)
        .sort((a, b) => a[0] - b[0]);

      let highlighted = "";
      let lastIndex = 0;

      indices.forEach(([start, end]) => {
        if (start < lastIndex) return;
        highlighted += text.slice(lastIndex, start);
        highlighted += `<mark>${text.slice(start, end + 1)}</mark>`;
        lastIndex = end + 1;
      });
    
      highlighted += text.slice(lastIndex);
      return highlighted;
    }

    function renderResults() {
      resultsList.innerHTML = "";
        
      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageItems = currentResults.slice(start, end);
        
      pageItems.forEach(({ item, matches }) => {
        const li = document.createElement("li");

        const title  = highlightText(item.title, matches, "title");
        const studio = highlightText(item.studio, matches, "studio");
        const season = highlightText(item.season, matches, "season");
        const genre  = highlightText(item.genre, matches, "genre");

        li.innerHTML = `
          <div class="group w-full h-auto rounded-lg">
            <a title="{{ .Title }}" href="${item.permalink}" class="block relative rounded-lg bg-slate-200 h-auto mx-auto overflow-hidden">
                <img loading="lazy" class="group-hover:scale-110 w-full h-[250px] md:h-[300px] rounded-lg rounded-t-lg transition duration-300 object-cover mx-auto" src='${item.thumbnail}' alt="${item.title}">
                <span class="absolute top-0 right-0 bg-sky-300 p-1 rounded-bl-lg">Donghua</span>
            </a>
            <a class="w-full h-auto block text-center py-2 text-wrap" href="${item.permalink}">
                <strong class="text-white group-hover:text-sky-300">${title}</strong>
                <br/>
                <small class="text-white group-hover:text-sky-300">
                  ${studio} • ${season} • ${genre}
                </small>
            </a>
          </div>
        `;
        
        resultsList.appendChild(li);
      });
    
      updatePagination();
    }

    function updatePagination() {
      const pagination = document.getElementById("search-pagination");
      const totalPages = Math.ceil(currentResults.length / perPage);

      if (totalPages <= 1) {
        pagination.style.display = "none";
        return;
      }
    
      pagination.style.display = "flex";
    
      document.getElementById("page-info").textContent =
        `Page ${currentPage} of ${totalPages}`;
    
      document.getElementById("prev-page").disabled = currentPage <= 1;
      document.getElementById("next-page").disabled =
        currentPage >= totalPages;
    }

    {{/*  Masukkan Data  */}}

    function parseGenres(input) {
      return input
        .toLowerCase()
        .split(/[, ]+/)       // koma atau spasi
        .map(g => g.trim())
        .filter(Boolean);
    }

    function parseKeywords(input) {
      return input
        .toLowerCase()
        .split(/[, ]+/)
        .map(k => k.trim())
        .filter(Boolean);
    }

    function getQueryFromURL() {
      const params = new URLSearchParams(window.location.search);
      return {
        q: params.get("q") || "",
        page: parseInt(params.get("page"), 10) || 1
      };
    }

    function updateURL(query, page = 1) {
      const params = new URLSearchParams(window.location.search);

      if (query) {
        params.set("q", query);
        params.set("page", page);
      } else {
        params.delete("q");
        params.delete("page");
      }
    
      const newUrl =
        window.location.pathname +
        (params.toString() ? `?${params.toString()}` : "");
    
      window.history.replaceState({}, "", newUrl);
    }

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim();

      resultsList.innerHTML = "";
      currentResults = [];
      document.getElementById("search-pagination").style.display = "none";

      if (!fuse || query.length < 2) {
        updateURL("");
        return;
      }
    
      const keywords = parseKeywords(query);
    
      currentResults = fuse.search({
        $and: keywords.map(k => ({
          $or: [
            { title: `'${k}` },
            { studio: `'${k}` },
            { season: `'${k}` },
            { genre: `'${k}` }
          ]
        }))
      });
    
      currentPage = 1;
      updateURL(query, currentPage);
      renderResults();
    });

    {{/*  Pagination  */}}

    document.getElementById("prev-page").addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        updateURL(searchInput.value.trim(), currentPage);
        renderResults();
      }
    });

    document.getElementById("next-page").addEventListener("click", () => {
      const totalPages = Math.ceil(currentResults.length / perPage);
      if (currentPage < totalPages) {
        currentPage++;
        updateURL(searchInput.value.trim(), currentPage);
        renderResults();
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      const { q, page } = getQueryFromURL();

      if (!q) return;

      searchInput.value = q;

      if (!fuse) {
        const waitFuse = setInterval(() => {
          if (fuse) {
            clearInterval(waitFuse);
            triggerSearchFromURL(q, page);
          }
        }, 50);
      } else {
        triggerSearchFromURL(q, page);
      }
    });

    function triggerSearchFromURL(query, page) {
      const keywords = parseKeywords(query);

      currentResults = fuse.search({
        $and: keywords.map(k => ({
          $or: [
            { title: `'${k}` },
            { studio: `'${k}` },
            { season: `'${k}` },
            { genre: `'${k}` }
          ]
        }))
      });
    
      currentPage = page;
      renderResults();
    }
</script>

{{/*  Script Filter-Genre  */}}

<script>
const genreForm = document.getElementById("genre-filter-form");

if (genreForm) {
  genreForm.addEventListener("submit", e => {
    e.preventDefault();

    const genres = [...document.querySelectorAll('input[name="genre"]:checked')]
      .map(i => i.value);

    if (!genres.length) return;

    window.location.href = "/filter-genre/#" + genres.join(",");
  });
}

function getGenresFromHash() {
  return location.hash
    .replace("#", "")
    .split(",")
    .map(g => g.trim().toLowerCase())
    .filter(Boolean);
}

const resultsContainer = document.getElementById("genre-results");

{{/*  Pagination  */}}
let genrePage = 1;
const genrePerPage = 12;
let genreResults = [];
{{/*  Akhir Pagination  */}}

function renderGenreResults() {
  const alertBox = document.getElementById("genre-alert");
  const pagination = document.getElementById("genre-pagination");

  resultsContainer.innerHTML = "";

  if (!genreResults.length) {
    alertBox.classList.remove("hidden");
    pagination.classList.add("hidden");
    return;
  }

  alertBox.classList.add("hidden");

  const totalPages = Math.ceil(genreResults.length / genrePerPage);
  const start = (genrePage - 1) * genrePerPage;
  const end = start + genrePerPage;

  genreResults.slice(start, end).forEach(item => {
    const div = document.createElement("div");
    div.className = "group w-full h-full rounded-lg";

    div.innerHTML = `
      <a href="${item.permalink}" class="block relative rounded-lg mx-auto overflow-hidden">
        <img loading="lazy"
             class="group-hover:scale-110 w-full h-[250px] md:h-[300px] rounded-lg transition duration-300 object-cover mx-auto"
             src="${item.thumbnail}"
             alt="${item.title}">
        <span class="absolute top-0 right-0 bg-sky-300 p-1 rounded-bl-lg">
          ${item.type || "Donghua"}
        </span>
      </a>
      <a class="w-full block text-center py-2" href="${item.permalink}">
        <span class="font-bold text-white group-hover:text-sky-300">
          ${item.title}
        </span>
      </a>
    `;

    resultsContainer.appendChild(div);
  });

  // Pagination UI
  pagination.classList.toggle("hidden", totalPages <= 1);
  document.getElementById("genre-page-info").textContent =
    `Page ${genrePage} of ${totalPages}`;

  document.getElementById("genre-prev").disabled = genrePage === 1;
  document.getElementById("genre-next").disabled = genrePage === totalPages;
}

document.getElementById("genre-prev").addEventListener("click", () => {
  if (genrePage > 1) {
    genrePage--;
    renderGenreResults();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
});

document.getElementById("genre-next").addEventListener("click", () => {
  const totalPages = Math.ceil(genreResults.length / genrePerPage);
  if (genrePage < totalPages) {
    genrePage++;
    renderGenreResults();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
});

  const selectedGenres = getGenresFromHash();

function normalizeGenres(input) {
  if (!input) return [];

  return input
    .toLowerCase()
    .split(/[,| ]+/)   // koma, |, atau spasi
    .map(g => g.trim())
    .filter(Boolean);
}

function filterByGenres(data, selectedGenres) {
  const selected = selectedGenres.map(g => g.toLowerCase());

  return data.filter(item => {
    if (!item.genre) return false;

    const itemGenres = normalizeGenres(item.genre);

    // AND logic → semua genre harus ada
    return selected.every(g => itemGenres.includes(g));
  });
}

  <script>
  // Blok klik kanan
  document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
  });

  // Blok F12, Ctrl+Shift+I, Ctrl+Shift+C, Ctrl+U, Ctrl+Shift+J
  document.addEventListener("keydown", function(e) {

      // F12
      if (e.key === "F12") {
          e.preventDefault();
      }

      // Ctrl+Shift+I
      if (e.ctrlKey && e.shiftKey && e.key === "I") {
          e.preventDefault();
      }

      // Ctrl+Shift+C
      if (e.ctrlKey && e.shiftKey && e.key === "C") {
          e.preventDefault();
      }

      // Ctrl+Shift+J
      if (e.ctrlKey && e.shiftKey && e.key === "J") {
          e.preventDefault();

      // Ctrl+U (view source)
