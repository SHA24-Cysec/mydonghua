<div class="mt-4 bg-slate-400 bg-opacity-50 p-4">
    <div class="flex flex-col mt-4 gap-2">
        {{/*  Div Download Batch  */}}
        <div class="grid grid-cols-1 md:grid-cols-2 grid-rows-1">
        {{ range .Params.downloadGroups }}
            <div class="download-group mb-6">
                <h3 class="bg-blue-300 select-none font-bold p-3 border-b-white border-b-2 w-full max-w-96"><i class="fa-solid fa-circle-info mr-2"></i>{{ .title }}</h3>
                {{ range .downloads }}
                  <div>
                    <div class="flex select-none flex-row items-center border-b-2 w-full max-w-96">
                      <span class="bg-blue-300 w-full max-w-16 flex items-center justify-center font-bold p-2">{{ .quality }}</span>
                      <a id="link-download" target="_blank" rel="nofollow noopener" href="{{ .link }}" class="bg-blue-200 w-full max-w-80 hover:text-sky-300 p-2">
                        <span class="font-bold flex items-center gap-2"><i class="fa-solid fa-cloud-arrow-down"></i>{{ .button }}</span>
                      </a>
                    </div>
                    <div id="ukuran-download" class="w-full border-b-2 flex items-center gap-1 justify-center font-bold max-w-96 bg-gradient-to-r from-blue-300 to-sky-200 p-2">
                      <i class="fa-solid fa-file-zipper"></i>
                      <span>{{ .size }}</span>
                    </div>
                  </div>
                {{ end }} 
            </div>
        {{ end }}
        </div>
        {{/*  Button Download  */}}
        <button title="Laporkan Link Download Mati" id="reportButton" class="mx-auto w-fit mt-4 cursor-pointer hover:bg-blue-400 hover:text-white p-2 rounded-lg bg-blue-300 font-bold scroll-mt-[300px]">
            Laporkan Link Mati
        </button>
        
        <script>
            document.getElementById("reportButton").addEventListener("click", function() {
                let currentUrl = window.location.href; // Ambil URL halaman saat ini
                let scriptUrl = "https://script.google.com/macros/s/AKfycbzUgz8gd9WRDuGmuPPs5WBHIgZ0L3T1tJLwdtL_RLQW7Rb5e7wu6mJZa9cP3w1mEKnbxw/exec"; // Ganti dengan URL Web App
        
                fetch(scriptUrl + "?url=" + encodeURIComponent(currentUrl), { 
                    method: "GET",
                    mode: "no-cors"
                }).then(() => {
                    alert("✅ Laporan berhasil dikirim untuk halaman: " + currentUrl);
                }).catch(error => {
                    alert("❌ Terjadi kesalahan: " + error);
                });
            });
        </script>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
    const linkDownloads = document.querySelectorAll("#link-download");
    const ukuranDownloads = document.querySelectorAll("#ukuran-download");
    
    linkDownloads.forEach((linkDownload, index) => {
        const buttonText = linkDownload.textContent.trim();
        const ukuranDownload = ukuranDownloads[index];
        
        if (buttonText.includes("Belum Tersedia")) {
            linkDownload.style.pointerEvents = "none"; // Nonaktifkan klik
            linkDownload.style.opacity = "0.5"; // Buat transparan
            if (ukuranDownload) ukuranDownload.style.display = "none"; // Sembunyikan ukuran download
        } else {
            linkDownload.style.pointerEvents = "auto"; // Aktifkan klik
            linkDownload.style.opacity = "1"; // Kembalikan ke normal
            if (ukuranDownload) ukuranDownload.style.display = "flex"; // Tampilkan ukuran download
        }
    });
});
</script>
