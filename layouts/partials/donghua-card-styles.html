<style>
    .donghua-card-grid,
    .donghua-card-grid * {
        box-sizing: border-box;
    }

    .donghua-card-grid {
        --donghua-grid-cols: 2;
        --donghua-grid-gap: clamp(0.72rem, 2vw, 1rem);
        display: grid;
        grid-template-columns: repeat(var(--donghua-grid-cols), minmax(0, 1fr));
        gap: var(--donghua-grid-gap);
        width: 100%;
        max-width: 100%;
        align-items: stretch;
    }

    .donghua-card-grid-main {
        --donghua-grid-lg: 4;
        --donghua-grid-xl: 4;
    }

    .donghua-card-grid-wide {
        --donghua-grid-lg: 5;
        --donghua-grid-xl: 6;
    }

    .donghua-card-grid-latest {
        --donghua-grid-lg: 4;
        --donghua-grid-xl: 4;
    }

    .donghua-card-grid > li,
    .donghua-card-item {
        min-width: 0;
        list-style: none;
    }

    .donghua-card {
        --donghua-accent: #22d3ee;
        position: relative;
        min-width: 0;
        width: 100%;
        animation: donghuaCardIn 0.42s ease both;
    }

    .donghua-card:nth-child(6n + 1),
    .donghua-card-grid > li:nth-child(6n + 1) .donghua-card { --donghua-accent: #22d3ee; }
    .donghua-card:nth-child(6n + 2),
    .donghua-card-grid > li:nth-child(6n + 2) .donghua-card { --donghua-accent: #38bdf8; }
    .donghua-card:nth-child(6n + 3),
    .donghua-card-grid > li:nth-child(6n + 3) .donghua-card { --donghua-accent: #8b5cf6; }
    .donghua-card:nth-child(6n + 4),
    .donghua-card-grid > li:nth-child(6n + 4) .donghua-card { --donghua-accent: #ec4899; }
    .donghua-card:nth-child(6n + 5),
    .donghua-card-grid > li:nth-child(6n + 5) .donghua-card { --donghua-accent: #22c55e; }
    .donghua-card:nth-child(6n + 6),
    .donghua-card-grid > li:nth-child(6n + 6) .donghua-card { --donghua-accent: #f59e0b; }

    .donghua-card-link {
        position: relative;
        isolation: isolate;
        display: block;
        width: 100%;
        min-height: 14.2rem;
        aspect-ratio: 0.66;
        overflow: hidden;
        border-radius: 1.18rem;
        padding: 2px;
        background:
            linear-gradient(135deg, var(--donghua-accent), rgba(255,255,255,0.04) 34%, #8b5cf6),
            rgba(15, 23, 42, 0.92);
        color: #eef7ff;
        text-decoration: none;
        box-shadow:
            0 16px 38px rgba(0, 0, 0, 0.30),
            0 0 20px color-mix(in srgb, var(--donghua-accent) 10%, transparent);
        transition: transform 0.22s ease, filter 0.22s ease, box-shadow 0.22s ease;
        -webkit-tap-highlight-color: transparent;
    }

    .donghua-card-link::before {
        content: "";
        position: absolute;
        inset: 2px;
        z-index: -1;
        border-radius: calc(1.18rem - 2px);
        background: #060816;
    }

    .donghua-card-link::after {
        content: "";
        position: absolute;
        inset: 2px;
        z-index: 1;
        pointer-events: none;
        border-radius: calc(1.18rem - 2px);
        background:
            radial-gradient(circle at 18% 10%, rgba(255,255,255,0.18), transparent 22%),
            radial-gradient(circle at 88% 0%, color-mix(in srgb, var(--donghua-accent) 18%, transparent), transparent 36%),
            linear-gradient(to top, rgba(4,6,20,0.92) 0%, rgba(4,6,20,0.62) 29%, rgba(4,6,20,0.10) 60%, transparent 100%);
    }

    .donghua-card-poster {
        position: absolute;
        inset: 2px;
        z-index: 0;
        overflow: hidden;
        border-radius: calc(1.18rem - 2px);
        background:
            radial-gradient(circle at 80% 0%, color-mix(in srgb, var(--donghua-accent) 35%, transparent), transparent 38%),
            linear-gradient(145deg, color-mix(in srgb, var(--donghua-accent) 34%, #111827), #07091a 72%);
    }

    .donghua-card-poster img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.42s ease, filter 0.42s ease;
    }

    .donghua-card-frame {
        position: absolute;
        inset: 0.58rem;
        z-index: 2;
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 0.88rem;
        box-shadow:
            inset 0 0 18px rgba(255,255,255,0.035),
            0 0 18px color-mix(in srgb, var(--donghua-accent) 10%, transparent);
    }

    .donghua-card-badges {
        position: absolute;
        inset: 0.72rem 0.72rem auto;
        z-index: 3;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.45rem;
        pointer-events: none;
    }

    .donghua-card-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        max-width: 100%;
        padding: 0.38rem 0.52rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.66);
        color: #d9fbff;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        font-size: 0.64rem;
        font-weight: 950;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        box-shadow: 0 0 14px rgba(0,0,0,0.18);
    }

    .donghua-card-badge.sub {
        flex: 0 0 auto;
        background: linear-gradient(135deg, rgba(236,72,153,0.94), rgba(139,92,246,0.94));
        color: #ffffff;
        border-color: rgba(255,255,255,0.20);
    }

    .donghua-card-body {
        position: absolute;
        inset: auto 0.58rem 0.58rem;
        z-index: 3;
        padding: 2.8rem 0.64rem 0.64rem;
        border-radius: 0.88rem;
        background: linear-gradient(to top, rgba(2,6,23,0.93), rgba(2,6,23,0.68) 58%, transparent);
    }

    .donghua-card-title {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
        margin: 0;
        color: #ffffff;
        font-size: clamp(0.78rem, 2.8vw, 0.92rem);
        font-weight: 950;
        line-height: 1.28;
        letter-spacing: -0.02em;
        text-shadow: 0 2px 10px rgba(0,0,0,0.86);
        transition: color 0.22s ease;
    }

    .donghua-card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.34rem;
        margin-top: 0.55rem;
        min-width: 0;
    }

    .donghua-card-chip {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        min-width: 0;
        padding: 0.28rem 0.42rem;
        border: 1px solid color-mix(in srgb, var(--donghua-accent) 24%, rgba(255,255,255,0.08));
        border-radius: 0.56rem;
        background: color-mix(in srgb, var(--donghua-accent) 10%, rgba(2,6,23,0.60));
        color: #d9fbff;
        font-size: 0.64rem;
        font-weight: 850;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .donghua-card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        margin-top: 0.58rem;
    }

    .donghua-card-rating {
        display: inline-flex;
        align-items: center;
        gap: 0.24rem;
        min-width: 0;
        color: #facc15;
        font-size: 0.68rem;
        font-weight: 950;
        line-height: 1;
    }

    .donghua-card-cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        min-height: 1.65rem;
        padding: 0 0.55rem;
        border-radius: 999px;
        background: rgba(238, 247, 255, 0.96);
        color: #06111f;
        font-size: 0.67rem;
        font-weight: 950;
        line-height: 1;
        box-shadow: 0 0 16px color-mix(in srgb, var(--donghua-accent) 12%, transparent);
    }

    .donghua-card-search-meta {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 1;
        overflow: hidden;
        margin-top: 0.46rem;
        color: #cbd5e1;
        font-size: 0.66rem;
        font-weight: 750;
        line-height: 1.25;
    }

    .donghua-card-title mark,
    .donghua-card-search-meta mark {
        background: linear-gradient(135deg, #ec4899, #8b5cf6);
        color: #ffffff;
        padding: 1px 4px;
        border-radius: 4px;
        font-weight: 950;
    }

    @media (hover: hover) {
        .donghua-card-link:hover {
            transform: translateY(-4px);
            filter: brightness(1.05);
            box-shadow:
                0 20px 42px rgba(0,0,0,0.36),
                0 0 25px color-mix(in srgb, var(--donghua-accent) 18%, transparent);
        }

        .donghua-card-link:hover .donghua-card-poster img {
            transform: scale(1.055);
            filter: saturate(1.08) contrast(1.03);
        }

        .donghua-card-link:hover .donghua-card-title {
            color: #cffafe;
        }
    }

    @media (max-width: 340px) {
        .donghua-card-grid {
            --donghua-grid-cols: 1;
        }

        .donghua-card-link {
            aspect-ratio: 1.08;
            min-height: 12rem;
        }
    }

    @media (min-width: 640px) {
        .donghua-card-grid {
            --donghua-grid-cols: 3;
        }
    }

    @media (min-width: 700px) {
        .donghua-card-grid {
            --donghua-grid-cols: 4;
        }
    }

    @media (min-width: 1024px) {
        .donghua-card-grid {
            --donghua-grid-cols: var(--donghua-grid-lg, 4);
        }
    }

    @media (min-width: 1180px) {
        .donghua-card-grid {
            --donghua-grid-cols: var(--donghua-grid-xl, var(--donghua-grid-lg, 4));
        }

        .donghua-card-title {
            font-size: 0.9rem;
        }
    }

    @keyframes donghuaCardIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
        .donghua-card,
        .donghua-card-link,
        .donghua-card-poster img,
        .donghua-card-title {
            animation: none !important;
            transition: none !important;
        }
    }
</style>
