{{ with resources.Get "css/main.css" }}
    {{ $minified := . | minify }}
    <link rel="stylesheet" href="{{ $minified.RelPermalink }}">
{{ end }}
<link rel="shortcut icon" href='{{ absURL "favicon.ico"}}' type="image/x-icon">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="dns-prefetch" href="https://www.google.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="preload" as="script" href="//safelinku.com/js/web-script.js">
{{- with .OutputFormats.Get "rss" -}}
  {{ printf `<link rel=%q type=%q href=%q title=%q>` .Rel .MediaType.Type .Permalink site.Title | safeHTML }}
{{ end }}
