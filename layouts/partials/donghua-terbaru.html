<div class="md:py-6 py-4 mx-auto w-full bg-[#0F172A]/80 border border-cyan-500/30 rounded-2xl mt-4 p-6 shadow-[0_0_25px_rgba(34,211,238,0.15)] backdrop-blur-md">
    <span class="font-extrabold text-xl text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 flex items-center gap-2 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]"><i class="fa fa-fire text-cyan-400 animate-pulse"></i>Donghua Terbaru</span>
    <hr class="mt-4 border-cyan-500/30">
    <div class="mt-5 grid grid-cols-2 md:grid-cols-4 gap-4 h-[600px] md:h-fit overflow-y-auto md:overflow-y-hidden pr-1">
        {{ range where .Site.RegularPages.ByDate.Reverse "Layout" "postingan-donghua" | first 8 }}
            <div class="h-full">
                <div class="group relative w-full h-[240px] md:h-[340px] rounded-2xl overflow-hidden bg-[#0F172A] border border-slate-800 hover:border-pink-500/80 transition-all duration-500 hover:shadow-[0_0_25px_rgba(236,72,153,0.4)] cursor-pointer">
                    <a title="{{ .Title }}" href="{{ .Permalink }}" class="absolute inset-0 z-0 block w-full h-full overflow-hidden">
                        <img loading="lazy" class="group-hover:scale-110 w-full h-full object-cover transition-transform duration-700 ease-out" src='{{ .Params.thumbnail | relURL }}' alt="{{ .Params.alt }}">
                        <span class="absolute top-3 left-3 z-20 bg-[#060816]/85 backdrop-blur-md border border-cyan-400 text-cyan-300 text-[10px] md:text-xs font-extrabold px-2.5 py-1 rounded-full shadow-[0_0_12px_rgba(34,211,238,0.5)] uppercase tracking-wider">{{ .Params.type }}</span>
                        <span class="absolute top-3 right-3 z-20 bg-gradient-to-r from-pink-500 to-purple-600 text-white text-[10px] md:text-xs font-extrabold px-2.5 py-1 rounded-full border border-pink-300/50 shadow-[0_0_12px_rgba(236,72,153,0.6)]">Sub</span>
                    </a>
                    <a class="absolute inset-x-0 bottom-0 z-10 flex flex-col justify-end pt-12 pb-3.5 px-3.5 bg-gradient-to-t from-[#060816] via-[#060816]/90 to-transparent" href="{{ .Permalink }}">
                        <span class="card-holo-title font-extrabold text-white text-xs md:text-sm line-clamp-2 leading-snug group-hover:text-pink-400 transition-colors drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]">{{ .Title }}</span>
                    </a>
                </div>
            </div>
        {{ end }}
    </div>
</div>
