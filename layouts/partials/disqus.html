<div class="p-4 bg-slate-300 mt-4">
    <div class="flex items-center justify-center">
        <button class="cursor-pointer bg-blue-300 p-2 rounded-lg hover:bg-blue-400 font-bold" id="buka-komen" type="button">
            <span class="flex items-center gap-1">
                <i class="fa-regular fa-comments"></i>
                Buka Komentar
            </span>
        </button>
        <button class="cursor-pointer hidden bg-blue-300 p-2 rounded-lg hover:bg-blue-400 font-bold" id="tutup-komen" type="button">
            <span class="flex items-center gap-1">
                <i class="fa-solid fa-close"></i>
                Tutup Komentar
            </span>
        </button>
    </div>
    <div class="rounded-lg p-4 mt-4 hidden" id="disqus_thread"></div>
</div>

<script>
    const bukaKomen = document.getElementById('buka-komen');
    const tutupKomen = document.getElementById('tutup-komen');
    const disqusContainer = document.getElementById('disqus_thread');

    let disqusLoaded = false;

    bukaKomen.addEventListener('click', () => {
        bukaKomen.classList.add('hidden');

        setTimeout(() => {
            tutupKomen.classList.remove('hidden');
            disqusContainer.classList.remove('hidden');

            if (!disqusLoaded) {
                disqusLoaded = true;
            
                var disqus_config = function () {
                    this.page.url = window.location.href;
                    this.page.identifier = window.location.pathname;
                };                
            
                var d = document, s = d.createElement('script');
                s.src = 'https://mydonghua.disqus.com/embed.js'; // Pastikan shortname benar
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            }            
        }, 1000);
    });

    tutupKomen.addEventListener('click', () => {
        tutupKomen.classList.add('hidden');
        disqusContainer.classList.add('hidden'); // Sembunyikan saja, jangan dihapus
        
        setTimeout(() => {
            bukaKomen.classList.remove('hidden');
        }, 1000);
    });    
</script>
