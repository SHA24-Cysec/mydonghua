<div class="p-4 bg-slate-300 mt-4">
    <div class="flex items-center justify-center">
        <button class="cursor-pointer bg-blue-300 p-2 rounded-lg hover:bg-blue-400 font-bold" id="buka-komen" type="button">
            <span class="flex items-center gap-1">
                <ion-icon class="w-5 h-5" name="chatbubble-ellipses-outline"></ion-icon>
                Buka Komentar
            </span>
        </button>
        <button class="cursor-pointer hidden bg-blue-300 p-2 rounded-lg hover:bg-blue-400 font-bold" id="tutup-komen" type="button">
            <span class="flex items-center gap-1">
                <ion-icon class="w-5 h-5" name="close"></ion-icon>
                Tutup Komentar
            </span>
        </button>
    </div>
    <div id="disqus" class="hidden rounded-lg bg-slate-400 p-4 mt-4">
    {{ template "_internal/disqus.html" . }}
    </div>
</div>

<script>
    const bukaKomen = document.getElementById('buka-komen');
    const tutupKomen = document.getElementById('tutup-komen');
    const disqus = document.getElementById('disqus');
    
    bukaKomen.addEventListener('click', () => {
        bukaKomen.classList.add('hidden');
        
        setTimeout(() => {
            tutupKomen.classList.remove('hidden');
            disqus.classList.remove('hidden');
        }, 2000); // Menunggu 2 detik sebelum menampilkan elemen
    });
    
    tutupKomen.addEventListener('click', () => {
        tutupKomen.classList.add('hidden');
        disqus.classList.add('hidden');
        
        setTimeout(() => {
            bukaKomen.classList.remove('hidden');
        }, 2000); // Menunggu 2 detik sebelum menampilkan kembali tombol "bukaKomen"
    });
</script>
