<div class="p-6 bg-[#0F172A]/90 border border-cyan-500/40 rounded-2xl shadow-[0_0_25px_rgba(34,211,238,0.15)] backdrop-blur-md mt-3">
    <div class="flex items-center justify-center gap-3">
        <div class="bg-gradient-to-r from-cyan-500 via-blue-600 to-purple-600 p-[1px] rounded-xl shadow-[0_0_20px_rgba(34,211,238,0.4)]" id="buka-komen">
            <button class="cursor-pointer bg-[#0F172A] hover:bg-[#060816] text-cyan-300 hover:text-white px-6 py-2.5 font-bold rounded-xl transition-colors duration-300 flex items-center gap-2" type="button">
                <i class="fa-regular fa-comments"></i>
                Buka Komentar
            </button>
        </div>
        <div class="hidden bg-gradient-to-r from-pink-500 via-red-500 to-orange-500 p-[1px] rounded-xl shadow-[0_0_20px_rgba(236,72,153,0.4)]" id="tutup-komen">
            <button class="cursor-pointer bg-[#0F172A] hover:bg-[#060816] text-pink-300 hover:text-white px-6 py-2.5 font-bold rounded-xl transition-colors duration-300 flex items-center gap-2" type="button">
                <i class="fa-solid fa-close"></i>
                Tutup Komentar
            </button>
        </div>
    </div>
    <div class="rounded-xl border border-cyan-500/30 bg-[#060816]/60 p-4 mt-6 hidden shadow-[0_0_15px_rgba(34,211,238,0.1)]" id="disqus_thread"></div>
</div>

<script>
    const bukaKomen = document.getElementById('buka-komen');
    const tutupKomen = document.getElementById('tutup-komen');
    const disqusContainer = document.getElementById('disqus_thread');

    let disqusLoaded = false;

    bukaKomen.addEventListener('click', () => {
        bukaKomen.classList.add('hidden');

        setTimeout(() => {
            tutupKomen.classList.remove('hidden');
            disqusContainer.classList.remove('hidden');

            if (!disqusLoaded) {
                disqusLoaded = true;
            
                var disqus_config = function () {
                    this.page.url = window.location.href;
                    this.page.identifier = window.location.pathname;
                };                
            
                var d = document, s = d.createElement('script');
                s.src = 'https://mydonghua.disqus.com/embed.js'; // Pastikan shortname benar
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            }            
        }, 1000);
    });

    tutupKomen.addEventListener('click', () => {
        tutupKomen.classList.add('hidden');
        disqusContainer.classList.add('hidden'); // Sembunyikan saja, jangan dihapus
        
        setTimeout(() => {
            bukaKomen.classList.remove('hidden');
        }, 1000);
    });    
</script>
