<div class="p-4 bg-slate-300 mt-4">
    <div class="flex items-center justify-center">
        <button class="cursor-pointer bg-blue-300 p-2 rounded-lg hover:bg-blue-400 font-bold" id="buka-komen" type="button">
            <span class="flex items-center gap-1">
                <ion-icon class="w-5 h-5" name="chatbubble-ellipses-outline"></ion-icon>
                Buka Komentar
            </span>
        </button>
        <button class="cursor-pointer hidden bg-blue-300 p-2 rounded-lg hover:bg-blue-400 font-bold" id="tutup-komen" type="button">
            <span class="flex items-center gap-1">
                <ion-icon class="w-5 h-5" name="close"></ion-icon>
                Tutup Komentar
            </span>
        </button>
    </div>
    <div class="hidden rounded-lg bg-slate-400 p-4 mt-4" id="disqus_thread"></div>
    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
        *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname;
            this.theme = 'light'; // Coba set 'dark' jika menggunakan tema gelap
          };
        (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');
        s.src = 'https://mydonghua.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</div>

<script>
    const bukaKomen = document.getElementById('buka-komen');
    const tutupKomen = document.getElementById('tutup-komen');
    const disqus = document.getElementById('disqus_thread');
    
    bukaKomen.addEventListener('click', () => {
        bukaKomen.classList.add('hidden');
        
        setTimeout(() => {
            tutupKomen.classList.remove('hidden');
            disqus.classList.remove('hidden');
        }, 1000); // Menunggu 1 detik sebelum menampilkan elemen
    });
    
    tutupKomen.addEventListener('click', () => {
        tutupKomen.classList.add('hidden');
        disqus.classList.add('hidden');
        
        setTimeout(() => {
            bukaKomen.classList.remove('hidden');
        }, 1000); // Menunggu 1 detik sebelum menampilkan kembali tombol "bukaKomen"
    });
</script>
