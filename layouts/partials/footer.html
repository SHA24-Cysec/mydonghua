.site-footer,

}

.site-footer {

  margin-top: 2rem;
  padding: 0;

.site-footer-aurora {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;

    transparent 0%,
    #22d3ee 20%,
    #38bdf8 35%,
    #8b5cf6 55%,
    #ec4899 75%,
    transparent 100%

}

.site-footer-links {
