<article class="donghua-card">
    <a class="donghua-card-link" title="{{ .Title }}" href="{{ .Permalink }}">
        <div class="donghua-card-poster">
            <img loading="lazy" src='{{ .Params.thumbnail | relURL }}' alt="{{ .Params.alt | default .Title }}">
        </div>
        <div class="donghua-card-frame" aria-hidden="true"></div>
        <div class="donghua-card-badges">
            <span class="donghua-card-badge">{{ .Params.type | default "Donghua" }}</span>
            <span class="donghua-card-badge sub">Sub</span>
        </div>
        <div class="donghua-card-body">
            <h3 class="donghua-card-title">{{ .Title }}</h3>
            <div class="donghua-card-meta">
                {{ with .Params.episode }}<span class="donghua-card-chip">{{ . }}</span>{{ end }}
                {{ with .Params.status }}<span class="donghua-card-chip">{{ . }}</span>{{ end }}
            </div>
            <div class="donghua-card-footer">
                {{ with .Params.rating }}
                    <span class="donghua-card-rating"><i class="fa-solid fa-star" aria-hidden="true"></i> {{ . }}/10</span>
                {{ else }}
                    <span class="donghua-card-rating"><i class="fa-solid fa-star" aria-hidden="true"></i> Donghua</span>
                {{ end }}
                <span class="donghua-card-cta">Detail</span>
            </div>
        </div>
    </a>
</article>
