<div class="bg-[#0F172A]/80 border border-cyan-500/30 rounded-2xl mt-6 p-6 shadow-[0_0_20px_rgba(34,211,238,0.15)] backdrop-blur-md">
    <span class="text-xl flex justify-center items-center text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]"><strong>Bagikan Donghua Ini</strong></span>
    <div class="share-buttons flex gap-3 justify-center items-center mt-5 bg-[#060816]/90 border border-slate-700/80 w-fit mx-auto rounded-2xl p-2 px-4 shadow-[0_0_15px_rgba(34,211,238,0.2)]">
        <a class="hover:drop-shadow-[0_0_12px_rgba(34,197,94,1)] transition duration-300 rounded-xl" title="Share on WhatsApp" href="https://api.whatsapp.com/send?text={{ .Title }}%20{{ .Permalink }}" target="_blank" rel="noopener noreferrer">
            <i class="fa-shake text-green-400 text-3xl fa-brands fa-whatsapp p-2"></i>
        </a>
        <a class="hover:drop-shadow-[0_0_12px_rgba(59,130,246,1)] transition duration-300 rounded-xl" title="Share on Facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink }}" target="_blank" rel="noopener noreferrer">
            <i class="fa-shake text-blue-400 text-3xl fa-brands fa-facebook p-2"></i>
        </a>
        <a class="hover:drop-shadow-[0_0_12px_rgba(56,189,248,1)] transition duration-300 rounded-xl" title="Share on Twitter" href="https://twitter.com/intent/tweet?text={{ .Title }}&url={{ .Permalink }}" target="_blank" rel="noopener noreferrer">
            <i class="fa-shake text-sky-400 text-3xl p-2 fa-brands fa-twitter"></i>
        </a>
        <a class="hover:drop-shadow-[0_0_12px_rgba(14,165,233,1)] transition duration-300 rounded-xl" title="Share on Telegram" href="https://t.me/share/url?url={{ .Permalink }}&text={{ .Title }}" target="_blank" rel="noopener noreferrer">
            <i class="fa-shake text-cyan-400 text-3xl p-2 fa-brands fa-telegram"></i>
        </a>
        <a class="hover:drop-shadow-[0_0_12px_rgba(236,72,153,1)] transition duration-300 rounded-xl" title="Share on Instagram" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
            <i class="fa-shake text-pink-500 text-3xl p-2 fa-brands fa-instagram"></i>
        </a>
    </div>
</div>
