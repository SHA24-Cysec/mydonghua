{{ $shareText := printf "%s %s" .Title .Permalink }}
{{ $shareTitle := .Title }}
{{ $shareURL := .Permalink }}

<div class="share-premium-card" data-share-component>
    <div class="share-premium-inner">
        <div class="share-premium-copy">
            <span class="share-premium-kicker">Support DonghuaBatch</span>
            <strong>Bagikan Donghua Ini</strong>
            <p>Suka batch ini? Share ke teman kamu atau salin link postingan.</p>
        </div>

        <div class="share-premium-side">
            <div class="share-premium-actions" role="group" aria-label="Tombol berbagi postingan">
                <a class="share-premium-button share-wa" title="Share on WhatsApp" aria-label="Share on WhatsApp" href="https://api.whatsapp.com/send?text={{ $shareText | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
                    <span>WhatsApp</span>
                </a>
                <a class="share-premium-button share-fb" title="Share on Facebook" aria-label="Share on Facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ $shareURL | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
                    <span>Facebook</span>
                </a>
                <a class="share-premium-button share-x" title="Share on X / Twitter" aria-label="Share on X atau Twitter" href="https://twitter.com/intent/tweet?text={{ $shareTitle | urlquery }}&url={{ $shareURL | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
                    <span>X</span>
                </a>
                <a class="share-premium-button share-tg" title="Share on Telegram" aria-label="Share on Telegram" href="https://t.me/share/url?url={{ $shareURL | urlquery }}&text={{ $shareTitle | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-telegram" aria-hidden="true"></i>
                    <span>Telegram</span>
                </a>
                <a class="share-premium-button share-ig" title="Buka Instagram" aria-label="Buka Instagram" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-instagram" aria-hidden="true"></i>
                    <span>Instagram</span>
                </a>
                <button class="share-premium-button share-copy" type="button" title="Salin link" aria-label="Salin link postingan" data-copy-url="{{ $shareURL }}">
                    <i class="fa-regular fa-copy" aria-hidden="true"></i>
                    <span>Copy</span>
                </button>
            </div>
            <span class="share-copy-feedback" aria-live="polite"></span>
        </div>
    </div>
</div>
