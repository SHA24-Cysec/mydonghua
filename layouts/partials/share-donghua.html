{{ $shareText := printf "%s %s" .Title .Permalink }}
{{ $shareTitle := .Title }}
{{ $shareURL := .Permalink }}

<div class="share-premium-card" data-share-component>
    <div class="share-premium-inner">
        <div class="share-premium-copy">
            <span class="share-premium-kicker">Support DonghuaBatch</span>
            <strong>Bagikan Donghua Ini</strong>
            <p>Suka batch ini? Share ke teman kamu atau salin link postingan.</p>
        </div>

        <div class="share-premium-side">
            <div class="share-premium-actions" aria-label="Tombol berbagi postingan">
                <a class="share-premium-button share-wa" title="Share on WhatsApp" aria-label="Share on WhatsApp" href="https://api.whatsapp.com/send?text={{ $shareText | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
                    <span>WhatsApp</span>
                </a>
                <a class="share-premium-button share-fb" title="Share on Facebook" aria-label="Share on Facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ $shareURL | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
                    <span>Facebook</span>
                </a>
                <a class="share-premium-button share-x" title="Share on X / Twitter" aria-label="Share on X atau Twitter" href="https://twitter.com/intent/tweet?text={{ $shareTitle | urlquery }}&url={{ $shareURL | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
                    <span>X</span>
                </a>
                <a class="share-premium-button share-tg" title="Share on Telegram" aria-label="Share on Telegram" href="https://t.me/share/url?url={{ $shareURL | urlquery }}&text={{ $shareTitle | urlquery }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-telegram" aria-hidden="true"></i>
                    <span>Telegram</span>
                </a>
                <a class="share-premium-button share-ig" title="Buka Instagram" aria-label="Buka Instagram" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-instagram" aria-hidden="true"></i>
                    <span>Instagram</span>
                </a>
                <button class="share-premium-button share-copy" type="button" title="Salin link" aria-label="Salin link postingan" data-copy-url="{{ $shareURL }}">
                    <i class="fa-regular fa-copy" aria-hidden="true"></i>
                    <span>Copy</span>
                </button>
            </div>
            <span class="share-copy-feedback" aria-live="polite"></span>
        </div>
    </div>
</div>

<style>
    .share-premium-card,
    .share-premium-card * {
        box-sizing: border-box;
    }

    .share-premium-card {
        position: relative;
        overflow: hidden;
        width: 100%;
        margin-top: 0.75rem;
        padding: clamp(1rem, 2.8vw, 1.35rem);
        border: 1px solid rgba(125, 211, 252, 0.24);
        border-radius: 1.75rem;
        background:
            radial-gradient(circle at 12% 0%, rgba(34, 211, 238, 0.16), transparent 34%),
            radial-gradient(circle at 88% 20%, rgba(168, 85, 247, 0.18), transparent 34%),
            linear-gradient(135deg, rgba(15, 23, 42, 0.88), rgba(2, 6, 23, 0.86));
        box-shadow:
            0 22px 70px rgba(0, 0, 0, 0.34),
            0 0 34px rgba(34, 211, 238, 0.12),
            inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        isolation: isolate;
    }

    .share-premium-card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
            linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent),
            linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
        background-size: 120% 100%, 34px 34px, 34px 34px;
        opacity: 0.42;
        mask-image: linear-gradient(90deg, rgba(0,0,0,0.9), rgba(0,0,0,0.35));
        z-index: -1;
    }

    .share-premium-card::after {
        content: "";
        position: absolute;
        right: -4rem;
        top: -4.5rem;
        width: 11rem;
        height: 11rem;
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.13);
        filter: blur(2px);
        z-index: -1;
    }

    .share-premium-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: clamp(1rem, 3vw, 1.5rem);
    }

    .share-premium-copy {
        min-width: 0;
        max-width: 30rem;
    }

    .share-premium-kicker {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        margin-bottom: 0.55rem;
        padding: 0.32rem 0.62rem;
        border: 1px solid rgba(34, 211, 238, 0.26);
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.09);
        color: #a5f3fc;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        line-height: 1;
        text-transform: uppercase;
    }

    .share-premium-copy strong {
        display: block;
        color: transparent;
        background: linear-gradient(90deg, #e0f2fe, #67e8f9 38%, #c084fc 78%, #f0abfc);
        -webkit-background-clip: text;
        background-clip: text;
        font-size: clamp(1.05rem, 2.6vw, 1.35rem);
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 1.15;
        filter: drop-shadow(0 0 14px rgba(34, 211, 238, 0.16));
    }

    .share-premium-copy p {
        max-width: 31rem;
        margin: 0.38rem 0 0;
        color: #a8bbd3;
        font-size: clamp(0.82rem, 2.2vw, 0.93rem);
        line-height: 1.55;
    }

    .share-premium-side {
        display: grid;
        justify-items: end;
        gap: 0.55rem;
        min-width: min(100%, 20.75rem);
    }

    .share-premium-actions {
        display: grid;
        grid-template-columns: repeat(6, 3rem);
        justify-content: end;
        gap: 0.62rem;
        width: fit-content;
        max-width: 100%;
    }

    .share-premium-button {
        --share-accent: #38bdf8;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3rem;
        height: 3rem;
        min-width: 2.75rem;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 0.95rem;
        outline: none;
        background:
            radial-gradient(circle at 35% 10%, color-mix(in srgb, var(--share-accent) 18%, transparent), transparent 55%),
            linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.92));
        color: var(--share-accent);
        box-shadow:
            0 12px 24px rgba(0, 0, 0, 0.22),
            inset 0 1px 0 rgba(255, 255, 255, 0.07);
        cursor: pointer;
        text-decoration: none;
        transition:
            transform 0.22s ease,
            border-color 0.22s ease,
            color 0.22s ease,
            background 0.22s ease,
            box-shadow 0.22s ease;
        -webkit-tap-highlight-color: transparent;
    }

    .share-premium-button i {
        position: relative;
        z-index: 1;
        font-size: 1.32rem;
        line-height: 1;
        transition: transform 0.22s ease;
    }

    .share-premium-button span {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    .share-premium-button:hover,
    .share-premium-button:focus-visible {
        transform: translateY(-3px) scale(1.035);
        border-color: color-mix(in srgb, var(--share-accent) 52%, transparent);
        color: #ffffff;
        background:
            radial-gradient(circle at 35% 10%, color-mix(in srgb, var(--share-accent) 42%, transparent), transparent 58%),
            linear-gradient(145deg, color-mix(in srgb, var(--share-accent) 38%, #111827), rgba(2, 6, 23, 0.96));
        box-shadow:
            0 17px 34px rgba(0, 0, 0, 0.28),
            0 0 24px color-mix(in srgb, var(--share-accent) 34%, transparent),
            inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .share-premium-button:hover i,
    .share-premium-button:focus-visible i {
        transform: scale(1.08) rotate(-3deg);
    }

    .share-premium-button:focus-visible {
        outline: 3px solid rgba(255, 255, 255, 0.55);
        outline-offset: 4px;
    }

    .share-wa { --share-accent: #22c55e; }
    .share-fb { --share-accent: #60a5fa; }
    .share-x { --share-accent: #38bdf8; }
    .share-tg { --share-accent: #22d3ee; }
    .share-ig { --share-accent: #ec4899; }
    .share-copy { --share-accent: #a78bfa; font: inherit; }

    .share-copy.is-copied {
        --share-accent: #34d399;
        color: #ffffff;
        border-color: rgba(52, 211, 153, 0.58);
        background:
            radial-gradient(circle at 35% 10%, rgba(52, 211, 153, 0.45), transparent 58%),
            linear-gradient(145deg, rgba(6, 95, 70, 0.85), rgba(2, 6, 23, 0.96));
        box-shadow: 0 0 26px rgba(52, 211, 153, 0.26), 0 16px 30px rgba(0,0,0,0.28);
    }

    .share-copy-feedback {
        min-height: 1rem;
        color: #a7f3d0;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1;
        text-align: right;
        opacity: 0;
        transform: translateY(-2px);
        transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .share-copy-feedback.is-visible {
        opacity: 1;
        transform: translateY(0);
    }

    @media (max-width: 720px) {
        .share-premium-inner {
            align-items: stretch;
            flex-direction: column;
        }

        .share-premium-copy {
            max-width: none;
            text-align: center;
        }

        .share-premium-kicker {
            margin-left: auto;
            margin-right: auto;
        }

        .share-premium-side {
            justify-items: stretch;
            min-width: 0;
            width: 100%;
        }

        .share-premium-actions {
            grid-template-columns: repeat(6, minmax(2.6rem, 1fr));
            width: 100%;
            justify-content: center;
            gap: 0.55rem;
        }

        .share-premium-button {
            width: 100%;
            height: 3rem;
        }

        .share-copy-feedback {
            text-align: center;
        }
    }

    @media (max-width: 520px) {
        .share-premium-card {
            border-radius: 1.35rem;
            padding: 0.95rem;
        }

        .share-premium-actions {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .share-premium-button {
            min-height: 3.15rem;
            border-radius: 0.9rem;
        }
    }

    @media (max-width: 340px) {
        .share-premium-actions {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }

    @media (hover: none) {
        .share-premium-button:hover {
            transform: none;
        }
    }
</style>

<script>
    (function () {
        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }

            return new Promise(function (resolve, reject) {
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();

                try {
                    document.execCommand('copy') ? resolve() : reject();
                } catch (error) {
                    reject(error);
                } finally {
                    document.body.removeChild(textarea);
                }
            });
        }

        document.addEventListener('click', function (event) {
            var button = event.target.closest('[data-copy-url]');
            if (!button) return;

            var component = button.closest('[data-share-component]');
            var feedback = component ? component.querySelector('.share-copy-feedback') : null;
            var icon = button.querySelector('i');
            var url = button.getAttribute('data-copy-url') || window.location.href;

            copyText(url).then(function () {
                button.classList.add('is-copied');
                if (icon) {
                    icon.className = 'fa-solid fa-check';
                }
                if (feedback) {
                    feedback.textContent = 'Link berhasil disalin!';
                    feedback.classList.add('is-visible');
                }

                window.setTimeout(function () {
                    button.classList.remove('is-copied');
                    if (icon) {
                        icon.className = 'fa-regular fa-copy';
                    }
                    if (feedback) {
                        feedback.classList.remove('is-visible');
                    }
                }, 1800);
            }).catch(function () {
                if (feedback) {
                    feedback.textContent = 'Gagal menyalin link.';
                    feedback.classList.add('is-visible');
                }
            });
        });
    })();
</script>
