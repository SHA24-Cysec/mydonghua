{{/*  Back to Top — Bottom Gauge Bar
      Position: fixed bottom-right
      Progress: gauge horizontal di bawah tombol rounded-square
      Colors: Aurora 4 warna (cyan → blue → purple → pink)
      Features: persentase + auto-hide saat scroll < 200px
      Mobile-first & responsive
*/}}

<style>
/* ============================
   BACK TO TOP — BOTTOM GAUGE BAR
   ============================ */
.btt-wrapper {
  position: fixed;
  bottom: 1.5rem;
  right: 1rem;
  margin-right: 16px;
  z-index: 40;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(16px) scale(0.92);
  transition:
    opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
    visibility 0.35s cubic-bezier(0.4, 0, 0.2, 1),
    transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}

.btt-wrapper.is-visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.btt-wrapper:hover {
  transform: translateY(-3px) scale(1);
}

.btt-btn {
  position: relative;
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(
    145deg,
    rgba(15, 23, 42, 0.95),
    rgba(6, 8, 22, 0.98)
  );
  border: 1px solid rgba(34, 211, 238, 0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.35),
    0 0 0 rgba(34, 211, 238, 0);
  transition:
    border-color 0.3s ease,
    box-shadow 0.3s ease,
    transform 0.22s ease;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  padding: 0;
  font: inherit;
  color: inherit;
  appearance: none;
}

.btt-btn:hover {
  border-color: rgba(34, 211, 238, 0.38);
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.35),
    0 0 18px rgba(34, 211, 238, 0.18);
}

.btt-btn:active {
  transform: scale(0.95);
}

.btt-btn:focus-visible {
  outline: 2px solid rgba(34, 211, 238, 0.6);
  outline-offset: 3px;
}

.btt-btn svg.btt-icon {
  width: 19px;
  height: 19px;
  color: #e2e8f0;
  transition: transform 0.22s ease, color 0.22s ease;
}

.btt-btn:hover svg.btt-icon {
  color: #67e8f9;
  transform: translateY(-2px);
}

/* --- Gauge Bar --- */
.btt-gauge {
  position: relative;
  width: 48px;
  height: 5px;
  border-radius: 99px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(34, 211, 238, 0.1);
  overflow: visible;
}

.btt-gauge-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(
    90deg,
    #22d3ee 0%,
    #38bdf8 33%,
    #8b5cf6 66%,
    #ec4899 100%
  );
  box-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
  width: 0%;
  transition: width 0.12s ease-out;
  position: relative;
}

/* Laser tip at the end of the gauge */
.btt-gauge-fill::after {
  content: '';
  position: absolute;
  right: -2px;
  top: -1.5px;
  bottom: -1.5px;
  width: 5px;
  border-radius: 99px;
  background: #fff;
  box-shadow:
    0 0 5px #22d3ee,
    0 0 10px rgba(34, 211, 238, 0.7),
    0 0 16px rgba(34, 211, 238, 0.35);
  opacity: 0.9;
}

/* --- Persentase --- */
.btt-pct {
  font-size: 0.58rem;
  font-weight: 800;
  letter-spacing: 0.02em;
  line-height: 1;
  color: rgba(148, 163, 184, 0.7);
  text-align: center;
  min-width: 2.2em;
  transition: color 0.25s ease;
  user-select: none;
  pointer-events: none;
}

.btt-wrapper:hover .btt-pct {
  color: rgba(103, 232, 249, 0.65);
}

/* ============================
   MOBILE ADJUSTMENTS
   ============================ */
@media (max-width: 480px) {
  .btt-wrapper {
    bottom: 1.25rem;
    right: 1rem;
    margin-right: 16px;
  }

  .btt-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
  }

  .btt-btn svg.btt-icon {
    width: 17px;
    height: 17px;
  }

  .btt-gauge {
    width: 44px;
    height: 4px;
  }
}

@media (max-width: 340px) {
  .btt-wrapper {
    bottom: 1rem;
    right: 1rem;
    margin-right: 16px;
  }
}

/* ============================
   REDUCED MOTION
   ============================ */
@media (prefers-reduced-motion: reduce) {
  .btt-wrapper,
  .btt-btn,
  .btt-btn svg.btt-icon,
  .btt-gauge-fill {
    transition-duration: 0.01ms !important;
  }

  .btt-gauge-fill::after {
    display: none;
  }
}
</style>

<div class="btt-wrapper" id="btt-wrapper" aria-hidden="true">
  <button
    class="btt-btn"
    id="btt-btn"
    type="button"
    aria-label="Kembali ke atas"
    title="Kembali ke atas"
  >
    <svg class="btt-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 19V5"/>
      <path d="m5 12 7-7 7 7"/>
    </svg>
  </button>
  <div class="btt-gauge" aria-hidden="true">
    <div class="btt-gauge-fill" id="btt-gauge-fill"></div>
  </div>
  <span class="btt-pct" id="btt-pct" aria-hidden="true">0%</span>
</div>

<script>
(function () {
  'use strict';

  var THRESHOLD = 200;

  var wrapper  = document.getElementById('btt-wrapper');
  var btn      = document.getElementById('btt-btn');
  var gauge    = document.getElementById('btt-gauge-fill');
  var pctLabel = document.getElementById('btt-pct');

  if (!wrapper || !btn || !gauge || !pctLabel) return;

  var isVisible  = false;
  var ticking    = false;
  var lastScrollY = 0;

  function getScrollPercent() {
    var doc = document.documentElement;
    var body = document.body;
    var scrollTop = window.pageYOffset || doc.scrollTop || body.scrollTop || 0;
    var scrollHeight = Math.max(
      body.scrollHeight, doc.scrollHeight,
      body.offsetHeight, doc.offsetHeight,
      body.clientHeight, doc.clientHeight
    );
    var clientHeight = doc.clientHeight;
    var maxScroll = scrollHeight - clientHeight;

    if (maxScroll <= 0) return 0;
    return Math.min(100, Math.round((scrollTop / maxScroll) * 100));
  }

  function update() {
    var scrollY = window.pageYOffset || document.documentElement.scrollTop || 0;
    var pct = getScrollPercent();
    var shouldBeVisible = scrollY > THRESHOLD;

    // Update gauge & percentage (always, even when hidden, so it's ready)
    gauge.style.width = pct + '%';
    pctLabel.textContent = pct + '%';

    // Toggle visibility
    if (shouldBeVisible !== isVisible) {
      isVisible = shouldBeVisible;
      if (isVisible) {
        wrapper.classList.add('is-visible');
        wrapper.setAttribute('aria-hidden', 'false');
      } else {
        wrapper.classList.remove('is-visible');
        wrapper.setAttribute('aria-hidden', 'true');
      }
    }

    ticking = false;
  }

  function onScroll() {
    if (!ticking) {
      window.requestAnimationFrame(update);
      ticking = true;
    }
  }

  // Click handler — smooth scroll to top
  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Keyboard support
  btn.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  // Passive scroll listener for performance
  window.addEventListener('scroll', onScroll, { passive: true });

  // Initial check on load
  update();
})();
</script>
