{{/*
  Dialog konfirmasi Hapus Semua Favorit.
  Partial ini hanya dirender pada layout Favorit melalui baseof.html.
  Storage, badge, bookmark, dan perilaku dialog ditangani site-favorites.js.
*/}}
<div class="fav-confirm" id="fav-confirm" aria-hidden="true">
  <div class="fav-confirm-box" role="alertdialog" aria-modal="true" aria-labelledby="fav-confirm-title" aria-describedby="fav-confirm-desc" tabindex="-1">
    <div class="fav-confirm-title" id="fav-confirm-title">
      <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
      Hapus Semua Favorit?
    </div>
    <div class="fav-confirm-text" id="fav-confirm-desc">
      Semua donghua favorit akan dihapus. Tindakan ini tidak bisa dibatalkan.
    </div>
    <div class="fav-confirm-actions">
      <button class="fav-confirm-btn" id="fav-cancel-btn" type="button">Batal</button>
      <button class="fav-confirm-btn danger" id="fav-confirm-yes-btn" type="button">Hapus Semua</button>
    </div>
  </div>
</div>
