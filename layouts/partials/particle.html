<div id="particles-js"></div>
<style>
    #particles-js {
        position: fixed;
        width: 100%;
        top: 0;
        height: 100%;
        z-index: -60;
        inset: 0;
    }
</style>
<script>
{{/*  particles.js dulu dimuat langsung dan ikut dieksekusi di jalur render
      kritis, padahal cuma dekorasi visual. Sekarang skripnya baru diambil
      setelah window "load", jumlah partikel juga dikurangi supaya lebih
      ringan di CPU/GPU (Total Blocking Time). Dimatikan juga kalau
      pengguna mengaktifkan "prefers-reduced-motion".  */}}
var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

if (!reduceMotion) {
  window.addEventListener("load", function () {
    var s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js";
    s.onload = function () {
      particlesJS("particles-js", {
        particles: {
          number: { value: 35 },
          color: { value: "#00eaff" },
          shape: { type: "circle" },
          opacity: { value: 1 },
          size: { value: 3 },
          move: {
            enable: true,
            speed: 0.25
          }
        },
        interactivity: {
          events: {
            onhover: { enable: false }
          }
        }
      });
    };
    document.body.appendChild(s);
  });
}
</script>
