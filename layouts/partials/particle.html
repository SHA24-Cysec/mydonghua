<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<div id="particles-js"></div>
<style>
    #particles-js {
        position: fixed;
        width: 100%;
        top: 0;
        height: 100%;
        z-index: -60;
        inset: 0;
    }
</style>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#00eaff" },
    shape: { type: "circle" },
    opacity: { value: 1 },
    size: { value: 3 },
    move: {
      enable: true,
      speed: 0.25
    }
  },
  interactivity: {
    events: {
      onhover: { enable: false }
    }
  }
});
</script>
