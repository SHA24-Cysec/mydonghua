{{ define "main" }}
    <div class="mt-4 mx-auto w-full max-w-screen-xl px-3 lg:px-0">
        <main class="w-full flex flex-col gap-4">
            {{/*  Main Content  */}}
            <div class="panel-neon p-3 sm:p-5">
                {{ if eq .Layout "filter-genre" }}
                    <h1 class="text-2xl md:text-3xl heading-neon flex items-center gap-3"><i class="fa-solid fa-filter text-cyan-400"></i>Daftar Donghua Berdasarkan Genre Yang Dipilih</h1>
                {{ end }}
            </div>
            <div class="panel-neon p-3 sm:p-5 min-h-screen">
                <div class="flex flex-col gap-4 w-full">
                    <div class="p-5 w-full">
                        <div id="genre-alert" class="hidden text-center bg-red-900/80 border border-red-500/50 text-white p-5 rounded-xl gap-4 shadow-neon-red font-semibold mb-4">
                            <span>Tidak ada donghua yang cocok dengan genre yang dipilih 😢</span>
                        </div>
                        <ul class="donghua-card-grid donghua-card-grid-wide" id="genre-results">
                        </ul>
                    </div>
                {{/*  Pagination  */}}
                <div id="genre-pagination" class="pagination-dock hidden w-full py-4 mx-auto text-slate-200">
                  <button id="genre-prev" class="pagination-dock-button">
                    <i class="fa-solid fa-chevron-left"></i> Prev
                  </button>
              
                  <span id="genre-page-info" class="pagination-dock-status"></span>
              
                  <button id="genre-next" class="pagination-dock-button">
                    Next <i class="fa-solid fa-chevron-right"></i>
                  </button>
                </div>
                </div>
            </div>
        </main>
    </div>
    
{{ end }}
