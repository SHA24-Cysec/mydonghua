{{ define "main" }}
    <div class="p-4 my-4 w-full max-w-screen-xl mx-auto bg-slate-300">
        <h1 class="font-bold text-2xl">{{ .Title }}</h1>
        <div class="">
            {{ .Content }}
        </div>
        <style>
            h2 {
                font-weight: 700;
                font-size: 20px;
                margin-top: 20px;
                margin-bottom: 20px;
            }
            h3 {
                font-weight: 700;
                font-size: 16px;
                margin-top: 20px;
                margin-bottom: 20px;
            }
            p {
                margin-top: 20px;
                margin-bottom: 20px;
                font-weight: normal;
            }
            ul {
                margin-left: 20px;
                font-weight: normal;
                list-style: square;
                margin-top: 20px;
                margin-bottom: 20px;
            }
            ol {
                margin-left: 40px;
                list-style: decimal;
                margin-top: 20px;
                margin-bottom: 20px;
            }
        </style>
    </div>
{{ end }}
