{{ define "main" }}
    <div class="w-full max-w-screen-xl mx-auto px-3 lg:px-0 mt-3 mb-3">
    <div class="p-6 md:p-8 w-full bg-[#0F172A]/80 border border-cyan-500/40 rounded-2xl shadow-[0_0_30px_rgba(34,211,238,0.2)] backdrop-blur-md">
        <h1 class="font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-sky-300 to-purple-400 text-2xl md:text-3xl border-b border-cyan-500/30 pb-4 mb-6 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]">{{ .Title }}</h1>
        <div class="text-slate-200 leading-relaxed font-sans">
            {{ .Content }}
        </div>
        <style>
            h2 {
                font-weight: 700;
                font-size: 22px;
                margin-top: 24px;
                margin-bottom: 16px;
                color: #22D3EE;
                text-shadow: 0 0 8px rgba(34, 211, 238, 0.4);
            }
            h3 {
                font-weight: 700;
                font-size: 18px;
                margin-top: 20px;
                margin-bottom: 14px;
                color: #8B5CF6;
                text-shadow: 0 0 8px rgba(139, 92, 246, 0.4);
            }
            p {
                margin-top: 16px;
                margin-bottom: 16px;
                font-weight: normal;
                color: #e2e8f0;
                line-height: 1.8;
            }
            ul {
                margin-left: 24px;
                font-weight: normal;
                list-style: square;
                margin-top: 16px;
                margin-bottom: 16px;
                color: #e2e8f0;
            }
            ol {
                margin-left: 32px;
                list-style: decimal;
                margin-top: 16px;
                margin-bottom: 16px;
                color: #e2e8f0;
            }
            a {
                color: #22D3EE;
                text-decoration: underline;
                transition: color 0.3s ease;
            }
            a:hover {
                color: #EC4899;
            }
        </style>
    </div>
    </div>
{{ end }}
