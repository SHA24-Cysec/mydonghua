{{ define "main" }}
    <div class="w-full max-w-screen-xl mx-auto px-3 lg:px-0 mt-4 mb-0">
    <div class="panel-neon p-3 sm:p-5 w-full min-h-screen flex flex-col items-center justify-center">
        <h1 class="heading-neon text-3xl text-center mb-4"><i class="fa-solid fa-envelope mr-2 text-cyan-400"></i>{{ .Title }}</h1>
        <form class="panel-neon-inset flex justify-center items-center flex-col gap-4 w-full max-w-md p-4 sm:p-5 shadow-neon-cyan-sm" action="https://formspree.io/f/xregejlg" method="POST" netlify>
            <label class="flex flex-col gap-2 text-left w-full">
              <span class="text-cyan-300 font-bold text-sm uppercase tracking-wider">Alamat Email</span>
              <input required placeholder="xiaoxiao@email.com" class="cyber-input-search" type="email" name="email">
            </label>
            <label class="flex flex-col gap-2 text-left w-full">
              <span class="text-purple-300 font-bold text-sm uppercase tracking-wider">Pesan Anda</span>
              <textarea required rows="4" placeholder="Tulis pesan atau saran Anda di sini..." class="cyber-textarea-message" name="message"></textarea>
            </label>
            <!-- your other form fields go here -->
            <button class="cyber-button cursor-pointer w-full rounded-xl p-3.5 transition-transform duration-200 hover:scale-[1.02] uppercase tracking-wider" type="submit"><i class="fa-solid fa-paper-plane mr-2"></i>Kirim Pesan</button>
        </form>
    </div>
    </div>
{{ end }}
