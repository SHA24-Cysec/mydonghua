{{ define "main" }}
<div class="w-full max-w-screen-xl mx-auto px-3 lg:px-0 mt-4 mb-0">
<div class="panel-neon flex flex-col w-full h-full min-h-screen p-3 sm:p-5">
    <h1 class="heading-neon text-2xl md:text-3xl text-center">{{ .Title }}</h1>
    <span class="badge-neon mt-4 mx-auto"><i class="fa-solid fa-info-circle mr-2 text-cyan-400"></i>Ketik minimal 3 huruf. Pisahkan genre dengan koma.</span>
    <div class="w-full max-w-[900px] mx-auto mt-4">
        <div class="aurora-search-container mb-4" role="search">
            <input class="aurora-search-input" type="search" name="q" id="search-input" placeholder="Cari judul donghua..." autocomplete="off" />
            <i class="fa-solid fa-magnifying-glass aurora-search-icon" aria-hidden="true"></i>
            <button type="button" class="aurora-search-btn" aria-label="Cari">
                <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                <span>Cari</span>
            </button>
        </div>
        <div id="search-summary" class="search-summary" hidden></div>

        {{/*  Elemen Postingan Pencarian  */}}
        <ul class="donghua-card-grid donghua-card-grid-wide h-full max-h-max" id="search-results"></ul>

        <div id="search-empty-state" class="search-empty-state" hidden>
            <div class="search-empty-icon"><i class="fa-solid fa-satellite-dish" aria-hidden="true"></i></div>
            <strong>Tidak ada hasil ditemukan</strong>
            <p>Coba kata kunci lain, gunakan judul yang lebih pendek, atau kombinasikan genre dengan tanda koma.</p>
        </div>

        {{/*  Pagination  */}}
        <div id="search-pagination" class="pagination-dock mt-4 text-slate-200">
            <button class="pagination-dock-button" id="prev-page" disabled><i class="fa-solid fa-chevron-left"></i> Prev</button>
            <span class="pagination-dock-status" id="page-info"></span>
            <button class="pagination-dock-button" id="next-page" disabled>Next <i class="fa-solid fa-chevron-right"></i></button>
        </div>
        
    </div>
</div>
</div>
{{ end }}
