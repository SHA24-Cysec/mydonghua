{{ define "main" }}
<div class="w-full max-w-screen-xl mx-auto px-3 lg:px-0 mt-3 mb-3">
<div class="bg-[#0F172A]/80 border border-cyan-500/40 rounded-2xl flex flex-col w-full h-full min-h-screen p-6 shadow-[0_0_30px_rgba(34,211,238,0.2)] backdrop-blur-md">
    <h1 class="font-extrabold text-2xl md:text-3xl text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 text-center drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">{{ .Title }}</h1>
    <span class="text-cyan-300 mt-4 bg-[#060816]/80 border border-cyan-500/30 px-4 py-2 w-fit mx-auto rounded-xl text-sm font-medium shadow-sm"><i class="fa-solid fa-info-circle mr-2 text-cyan-400"></i>Cari genre dalam jumlah banyak pakai tanda koma</span>
    <div class="w-full max-w-[900px] mx-auto mt-4">
        <div class="aurora-container mb-6">
            <input class="aurora-input" type="text" id="search-input" placeholder="Cari judul donghua favoritmu..."/>
            <i class="fa-solid fa-search aurora-icon text-lg"></i>
        </div>
        {{/*  Elemen Postingan Pencarian  */}}
        <ul class="donghua-card-grid donghua-card-grid-wide h-full max-h-max" id="search-results"></ul>
        {{/*  Pagination  */}}
        <div id="search-pagination" class="flex gap-2 mt-4 w-max p-2 rounded-xl mx-auto items-center flex-wrap text-slate-200">
            <button class="cyber-pill-nav" id="prev-page" disabled><i class="fa-solid fa-chevron-left"></i> Prev</button>
            <span class="px-4 py-2.5 bg-[#0F172A] border border-cyan-500/30 rounded-xl font-bold text-cyan-300 shadow-sm" id="page-info"></span>
            <button class="cyber-pill-nav" id="next-page" disabled>Next <i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <style>
            #search-results li {
                list-style: none;
            }
            #search-pagination {
                display: none;
            }
            mark {
                background: linear-gradient(135deg, #EC4899, #8B5CF6);
                color: #ffffff;
                padding: 1px 4px;
                border-radius: 4px;
                font-weight: bold;
            }
        </style>
    </div>
</div>
</div>
{{ end }}
