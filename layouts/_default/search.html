{{ define "main" }}
<div class="bg-slate-300 bg-opacity-50 flex flex-col w-full h-full min-h-screen mx-auto max-w-screen-xl p-4 my-4">
    <h1 class="font-bold text-2xl text-white text-center">{{ .Title }}</h1>
    <span class="text-white mt-4 bg-slate-400 p-2 w-fit mx-auto rounded-lg"><i class="fa-solid fa-info-circle mr-2"></i>Cari genre dalam jumlah banyak pakai tanda koma</span>
    <div class="w-full max-w-[900px] mx-auto mt-4">
        <div class="relative">
            <input class="w-full p-2 px-4 mb-4 rounded-lg focus:outline-sky-300 focus:shadow-md focus:shadow-sky-300" type="text" id="search-input" placeholder="Cari..."/>
            <i class="fa-solid fa-search absolute right-4 bottom-1/2"></i>
        </div>
        {{/*  Elemen Postingan Pencarian  */}}
        <ul class="grid grid-cols-2 md:grid-cols-4 gap-4 text-white h-full max-h-max" id="search-results"></ul>
        {{/*  Pagination  */}}
        <div id="search-pagination" class="flex gap-4 mt-4 w-max p-2 rounded-lg mx-auto items-center flex-wrap text-white">
            <button class="p-2 bg-slate-400 rounded-lg hover:bg-sky-300" id="prev-page" disabled>Prev</button>
            <span class="p-2 bg-slate-400 rounded-lg" id="page-info"></span>
            <button class="p-2 bg-slate-400 rounded-lg hover:bg-sky-300" id="next-page" disabled>Next</button>
        </div>
        <style>
            #search-results li a {
                display: block;
                width: 100%;
                max-width: 900px;
                height: 100%;
                border-radius: 8px;
            }
            #search-results li a img {
                height: 250px;
                width: 100%;
            }
            @media (min-width:768px) {
                #search-results li a img {
                height: 300px;
                }
            }
            #search-pagination {
                display: none;
            }
            mark {
                background-color: red;
                color: inherit;
                padding: 0 2px;
                border-radius: 3px;
            }
        </style>
    </div>
</div>
{{ end }}
